<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>시간의 주인 - 이클립스의 딜렘</title>
  <link rel="stylesheet" href="sim-template.css">
  <meta property="og:title" content="시간의 주인 - 이클립스의 딜렘">
  <meta property="og:description" content="당신은 시간을 어떻게 바라보는 사람인가?">
  <meta property="og:image" content="https://eclipse-mindlab.github.io/mindlab/og-image.png?v=2">
  <style>
    :root {
      --sim-primary: #6d9dc5;
      --sim-primary-light: #8bb8db;
      --sim-primary-bg: rgba(109, 157, 197, 0.1);
      --sim-primary-border: rgba(109, 157, 197, 0.3);
    }
  </style>
</head>
<body>
  <div class="sim-container">
    <div class="sim-header">
      <a href="index.html" class="sim-back-btn">←</a>
      <div class="sim-header-title">시간의 주인</div>
    </div>
    <div id="gameScreen">
      <div class="sim-progress">
        <div class="sim-progress-label">
          <span id="stageLabel">STAGE 1</span>
          <span id="stageCount">1/5</span>
        </div>
        <div class="sim-progress-bar">
          <div class="sim-progress-fill" id="progressFill" style="width: 20%"></div>
        </div>
      </div>
      <div class="sim-stage-badge" id="stageBadge">STAGE 1</div>
      <div class="sim-situation">
        <div class="sim-situation-title" id="situationTitle"></div>
        <div class="sim-situation-desc" id="situationDesc"></div>
        <div class="sim-situation-highlight hidden" id="situationHighlight"></div>
        <div class="sim-situation-quote hidden" id="situationQuote"></div>
      </div>
      <div class="sim-choices" id="choices"></div>
    </div>
    <div id="explanationScreen" class="hidden">
      <div class="sim-explanation-card">
        <div class="sim-explanation-label">당신의 선택</div>
        <div class="sim-explanation-title" id="yourChoice"></div>
      </div>
      <div class="sim-explanation-card" id="meaningCard">
        <div class="sim-explanation-label">이 선택이 의미하는 것</div>
        <div class="sim-explanation-desc" id="choiceMeaning"></div>
      </div>
      <div class="sim-principle-card hidden" id="principleCard">
        <div class="sim-principle-header">
          <span class="sim-principle-icon">💡</span>
          <span>발견한 원칙</span>
        </div>
        <div class="sim-principle-name" id="principleName"></div>
        <div class="sim-principle-desc" id="principleDesc"></div>
      </div>
      <div class="sim-quote-card hidden" id="quoteCard">
        <span class="sim-quote-icon">💬</span>
        <span class="sim-quote-text" id="quoteText"></span>
      </div>
      <button class="sim-next-btn" id="nextBtn">다음으로</button>
    </div>
    <div id="resultScreen" class="hidden">
      <div class="sim-result-card">
        <div class="sim-result-icon" id="resultIcon">⏳</div>
        <div class="sim-result-label" id="resultLabel">당신의 유형</div>
        <div class="sim-result-title" id="resultTitle"></div>
        <div class="sim-result-desc" id="resultDesc"></div>
        <div class="sim-result-stats hidden" id="resultStats"></div>
      </div>
      <div class="sim-principles-list hidden" id="principlesList"></div>
      <div class="sim-actions">
        <button class="sim-action-btn primary" id="saveImageBtn">📸 이미지 저장하기</button>
        <button class="sim-action-btn secondary" id="shareBtn">친구한테 시켜보기</button>
        <a href="index.html" class="sim-action-btn secondary">탐험 지도로 돌아가기</a>
      </div>
      <canvas id="shareCanvas" style="display:none;"></canvas>
      <div class="sim-promo">
        <div style="text-align: center; margin-bottom: 20px;">
          <div style="font-size: 14px; color: #6d9dc5; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px;">이 시뮬레이터의 바탕이 된 생각들이 궁금하다면</div>
        </div>
        <a href="https://litt.ly/eclipse.thinker" target="_blank" style="display: block; text-decoration: none; margin-bottom: 24px;">
          <div style="background: linear-gradient(135deg, #101520 0%, #182030 50%, #101520 100%); border: 1px solid rgba(109, 157, 197, 0.3); border-radius: 16px; padding: 24px; text-align: center;">
            <img src="book-philosophy.png" alt="훔친 철학 편" style="width: 200px; height: auto; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(109, 157, 197, 0.2);">
            <div style="font-size: 17px; font-weight: 700; color: #6d9dc5; margin-bottom: 6px;">세계척학전집 — 훔친 철학 편</div>
            <div style="font-size: 12px; color: #71717a;">있어 보이는 척하기 좋은 철학의 문법</div>
          </div>
        </a>

        <div style="font-size: 12px; color: #52525b; text-align: center; margin-bottom: 12px;">시리즈 더 보기</div>
        <div class="sim-books-grid">
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-psychology.png" alt="훔친 심리학 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 심리학 편</div>
          </a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-wealth.png" alt="훔친 부 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 부 편</div>
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script src="sim-template.js"></script>
  <script>
    const CONFIG = {
      id: 'time-master',
      title: '시간의 주인',
      shareIcon: '⏳',
      shareUrl: 'https://bit.ly/time-master-sim',
      version: 5,
      
      stages: [
        {
          badge: '속도',
          title: '사라진 1년',
          desc: `당신은 직장인이다. 매일 같은 시간에 출근하고, 같은 시간에 퇴근한다.

어느 날 문득 깨달았다.

지난 1년이 기억나지 않는다. 분명 365일을 살았는데, 돌아보면 하루 같다.

월요일과 금요일의 차이를 모르겠다. 1월과 11월의 차이도 모르겠다.

뇌는 새로운 자극이 없으면 시간을 압축한다. 어릴 적 여름방학이 영원 같았던 건, 모든 게 낯설었기 때문이다.

당신의 시간이 빨리 흐르는 건, 삶에서 경이로움이 사라졌다는 신호다.`,
          highlight: '1년이 하루처럼 사라졌다. 어떻게 하겠는가?',
          choices: [
            {
              id: 'quit1',
              text: '환경을 바꾼다.',
              subtext: '새로운 곳으로 간다.',
              meaning: '퇴사했다. 새로운 도시, 새로운 사람들. 처음 한 달은 하루가 일주일 같다. 모든 게 낯설고, 시간이 느려진 것 같다. 하지만 6개월이 지나면? 새로운 일상도 결국 일상이 된다. 환경을 바꿔도 뇌는 다시 적응한다. 그때 또 바꿀 것인가?',
              principle: { name: '생물학적 시간', desc: '뇌는 새로운 자극을 처리할 때 시간을 길게 느낀다. 모든 게 낯선 아이의 하루는 수만 장의 사진으로 저장된다. 반복에 매몰된 어른의 1년은 한 장으로 압축된다. 시간을 늘리는 방법은 시계를 멈추는 게 아니라, 낯선 경험으로 뇌를 깨우는 것이다.', icon: '🧠' },
              quote: '"시간은 모든 사람에게 같은 속도로 흐르지 않는다. 뇌가 경험하는 밀도가 시간의 체감 속도를 결정한다."'
            },
            {
              id: 'awake1',
              text: '같은 일상을 다르게 본다.',
              subtext: '바꿀 건 환경이 아니라 시선이다.',
              meaning: '오늘 출근길에 처음으로 하늘을 올려다봤다. 구름이 어제와 다르다. 점심에 매일 가던 식당에서 처음으로 사장님과 대화했다. 같은 하루인데 다르게 느껴진다. 하지만 이게 얼마나 갈까? 깨어있으려는 노력은 지치게 만든다.',
              principle: { name: '찰나의 각성', desc: '불교는 말한다. 눈 한 번 깜빡이는 순간에도 우주가 수십 번 생겨나고 사라진다. 같은 하루도 깨어있으면 매 순간이 다르다. 시간이 빨리 가는 건 시간의 문제가 아니라, 당신이 잠들어 있기 때문이다. 지금 이 순간에 깨어있는 것, 그것이 찰나의 본질이다.', icon: '👁️' },
              quote: '"과거에 얽매이지 말고, 미래를 걱정하지 말라. 오직 현재만이 있다." - 붓다'
            },
            {
              id: 'accept1',
              text: '기다린다. 겨울이 지나면 봄이 온다.',
              subtext: '지금은 바닥일 뿐이다.',
              meaning: '무기력한 시기가 있다. 모든 게 회색으로 보이는 계절. 하지만 봄이 오지 않은 겨울은 없었다. 지금 시간이 빨리 흐르는 건, 아직 변화의 계절이 오지 않았을 뿐이다. 자연은 서두르지 않는다. 문제는 — 당신이 그만큼 기다릴 수 있느냐다.',
              principle: { name: '순환적 시간', desc: '동양에서 시간은 직선이 아니라 원이다. 봄, 여름, 가을, 겨울. 끝은 곧 시작이고, 시작은 곧 끝이다. 서양이 시간을 정복하라고 외칠 때, 동양은 흐름에 몸을 맡기라고 속삭인다. 지금이 겨울이라면, 봄은 반드시 온다.', icon: '🔄' },
              quote: '"겨울이 오면, 봄이 멀겠는가?" - 셸리'
            }
          ]
        },
        {
          badge: '후회',
          title: '10년 전의 갈림길',
          desc: `가끔 생각한다.

10년 전, 그때 다른 선택을 했으면 지금 어떤 삶이었을까.

그때 그 사람에게 고백했으면.
그때 그 회사에 갔으면.
그때 포기하지 않았으면.

지금과 완전히 다른 삶이 펼쳐졌을 것이다.

타임머신이 있다면 돌아가겠는가?

단, 조건이 있다. 돌아가면 지금의 기억은 사라진다. 새로운 타임라인의 당신이 될 뿐이다. 지금의 당신은 사라진다.`,
          highlight: '과거로 돌아갈 수 있다면, 돌아가겠는가?',
          choices: [
            {
              id: 'goback2',
              text: '돌아간다.',
              subtext: '다시 시작하면 더 잘할 수 있다.',
              meaning: '돌아갔다. 하지만 당신은 기억이 없다. 10년 전의 당신은 같은 정보, 같은 감정, 같은 미숙함을 가지고 있다. 그때의 당신이 "더 나은 선택"을 할 거라는 보장이 어디에 있는가? 후회하는 건 지금의 당신이다. 그때의 당신은 그게 최선이었다.',
              principle: { name: '직선적 시간의 함정', desc: '서양의 직선적 시간관은 진보를 약속한다. 과거에서 미래로, 항상 더 나은 방향으로. 하지만 이 직선은 영원한 조바심을 안긴다. 뒤처지면 안 된다, 시간을 낭비하면 안 된다. 과거를 고치면 미래가 나아질 거라는 믿음도 이 직선 위에 있다. 하지만 직선 위의 어디로 가든, 조바심은 따라온다.', icon: '➡️' },
              quote: '"시간은 화살처럼 날아간다. 하지만 화살은 과녁을 알지 못한다."'
            },
            {
              id: 'stay2',
              text: '돌아가지 않는다.',
              subtext: '그 선택이 지금의 나를 만들었다.',
              meaning: '후회스러운 선택이 있다. 하지만 그 선택이 없었으면 지금의 당신도 없다. 실패가 가르쳐준 것, 상처가 단단하게 만든 것, 돌아간 길에서 만난 사람. 그 모든 걸 지우고 싶은가? 니체는 말했다. 이 삶을 영원히 반복해도 기꺼이 받아들일 수 있느냐고. 그것이 운명을 사랑하는 것이라고.',
              principle: { name: '아모르 파티', desc: '니체의 영원회귀. 지금 이 순간이 영원히 반복된다면? 모든 고통도, 모든 기쁨도. 이 질문에 기꺼이 "좋다"고 답할 수 있는 삶을 살라고 니체는 말한다. 후회란 "다른 삶이 가능했다"는 믿음이다. 하지만 이 삶만이 당신의 삶이다.', icon: '♾️' },
              quote: '"네 삶을 영원히 반복해도 좋다고 말할 수 있는가? 그것이 아모르 파티다." - 니체'
            },
            {
              id: 'question2',
              text: '과거는 존재하지 않는다. 돌아갈 곳이 없다.',
              subtext: '후회 자체가 착각이다.',
              meaning: '과거는 어디에 있는가? 당신의 기억 속에만 있다. 하지만 기억은 지금 당신의 뇌에서 일어나는 일이다. 과거 자체는 이미 사라졌다. 돌아갈 "그때"는 존재하지 않는다. 존재하는 건 지금뿐이다. 후회란 존재하지 않는 장소를 그리워하는 것이다.',
              principle: { name: '현재주의', desc: '과거와 미래는 실재하지 않는다. 오직 지금만 존재한다. 과거는 기억이라는 현재의 활동이고, 미래는 기대라는 현재의 활동이다. 우리는 존재하지 않는 두 유령 사이에 끼어 산다. 어제의 후회, 내일의 불안. 유일하게 실재하는 현재를 탕진하면서.', icon: '📍' },
              quote: '"실재하는 것은 현재뿐이다. 과거와 미래는 현재 안에 있는 심리적 상태일 뿐이다." - 아우구스티누스'
            }
          ]
        },
        {
          badge: '압박',
          title: '부족한 24시간',
          desc: `하루 24시간이 부족하다.

할 일 목록은 끝없이 늘어난다. 메일, 회의, 보고서, 운동, 공부, 연락, 약속.

기술이 발전했다. 이동은 빨라졌고, 소통은 즉각적이 됐다. 시간이 남아야 정상인데 — 왜 과거보다 더 바쁜가?

해야 할 일이 늘어나는 속도가, 기술이 절약해주는 속도보다 빠르기 때문이다.

우리는 더 빠르게 달리고 있지만, 목적지와의 거리는 줄어들지 않는다.`,
          highlight: '만성적으로 시간이 부족하다. 어떻게 하겠는가?',
          choices: [
            {
              id: 'manage3',
              text: '더 효율적으로 관리한다.',
              subtext: '시간을 쪼개고 최적화한다.',
              meaning: '타임블록, 포모도로, 투두리스트. 분 단위로 하루를 쪼갠다. 효율은 올라갔다. 하지만 이상하다. 시간을 더 잘 쓰는데, 여유는 더 없다. 빈틈이 생기면 즉시 다른 할 일로 채워진다. 효율적으로 사는 건 자유가 아니라, 더 정교한 감옥이다.',
              principle: { name: '규율적 시간', desc: '1시간이라는 단위는 자연에 존재하지 않는다. 산업혁명 이전 인간은 해가 뜨면 일어나고 배고프면 먹었다. 분 단위로 쪼개진 시간표는 자본가가 노동력을 관리하기 위해 만든 것이다. 시간을 관리한다는 건, 시스템이 설계한 규율 안에서 더 열심히 뛰겠다는 뜻이다.', icon: '⏰' },
              quote: '"시계탑은 마을 어디서나 보이게 높이 세워졌다. 감시를 위해서."'
            },
            {
              id: 'reduce3',
              text: '할 일을 줄인다. 중요한 것만 남긴다.',
              subtext: '전부 할 필요 없다.',
              meaning: '할 일 목록의 절반을 지웠다. "안 해도 되는 일"이 이렇게 많았나. 저녁에 아무것도 안 하고 앉아 있었다. 이상하게 불안하다. 뭔가 해야 할 것 같다. 아무것도 안 하는 게 이렇게 어려운 일이었나. 파스칼은 말했다. 인간의 모든 불행은 방에 조용히 앉아 있지 못하는 데서 온다고.',
              principle: { name: '카이로스', desc: '고대 그리스인은 두 종류의 시간을 구분했다. 크로노스는 시계가 재는 객관적 시간. 카이로스는 의미 있는 순간, 살아있다고 느끼는 시간. 사랑에 빠진 순간, 아이가 태어난 순간. 시계로 잴 수 없다. 인생의 길이는 크로노스의 총합이 아니라, 카이로스를 얼마나 태웠느냐로 결정된다.', icon: '✨' },
              quote: '"인간의 모든 불행은 방에 조용히 앉아 있지 못하는 데서 온다." - 파스칼'

      words.forEach(word => {
        const test = line + word + ' ';
        if (ctx.measureText(test).width > 700) { ctx.fillText(line, 400, y); line = word + ' '; y += 28; }
        else { line = test; }
      });
      if (line) ctx.fillText(line, 400, y);
      
      ctx.font = 'bold 20px -apple-system, sans-serif';
      ctx.fillStyle = '#6d9dc5';
      ctx.fillText('시간의 주인', 400, 390);
      ctx.font = '14px -apple-system, sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText('eclipse-mindlab.github.io/mindlab', 400, 410);
      
      const link = document.createElement('a');
      link.download = '시간의주인_결과.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  </script>
</body>
</html>
