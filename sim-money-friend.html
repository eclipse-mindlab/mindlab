    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {

      background: #09090b;
      color: #fff;

    .container { max-width: 540px; margin: 0 auto; }
    
    .header { margin-bottom: 32px; }

    .back-btn {

      gap: 6px;

    .header-content { text-align: center; }

    .header h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
    .header p { font-size: 14px; color: #8b8b92; }
    
    .progress { display: flex; gap: 8px; margin-bottom: 24px; }
    
    .progress-bar {
      height: 4px;

      border-radius: 4px;
      background: #232326;

    .progress-bar.completed { background: #9580ff; }
    .progress-bar.current { background: rgba(167, 139, 250, 0.5); }
    
    .scenario-card {

    }

    .stage-label {

      margin-bottom: 8px;

    }
    
    .context {

      color: #a1a1aa;
      margin-bottom: 12px;
      padding: 12px;
      background: #1a1a1e;
      border-radius: 8px;
    }
    
    .situation { font-size: 17px; line-height: 1.8; }
    
    .choices { display: flex; flex-direction: column; gap: 12px; }
    
    .choice-btn {

      text-align: left;
      padding: 16px;
      background: #141417;
      border: 1px solid #232326;

      color: #fff;

      background: #141417;

    .selected-text { color: #d4d4d8; line-height: 1.6; }
    
    .outcome-card {
      padding: 16px;
      background: rgba(24, 24, 27, 0.5);

      margin-bottom: 16px;

    .outcome-label { font-size: 13px; color: #8b8b92; margin-bottom: 8px; }

    .principle-label {

      color: #9580ff;
      text-transform: uppercase;
      letter-spacing: 1px;

    .principle-name { color: #fff; font-weight: 600; font-size: 16px; margin-bottom: 8px; }
    .principle-explanation { color: #a1a1aa; line-height: 1.8; font-size: 14px; }

    .evaluation-card {
      display: flex;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      align-items: flex-start;
    }

    .evaluation-card.positive {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .evaluation-card.neutral {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .evaluation-card.negative {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .evaluation-icon { font-size: 18px; flex-shrink: 0; }
    .evaluation-text { font-size: 14px; line-height: 1.7; }

    .evaluation-card.positive .evaluation-text { color: #4ade80; }
    .evaluation-card.neutral .evaluation-text { color: #fbbf24; }
    .evaluation-card.negative .evaluation-text { color: #f87171; }

    .other-choices-section { margin-bottom: 16px; }

    .other-choices-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      background: transparent;
      border: 1px solid #232326;
      border-radius: 10px;
      color: #8b8b92;
      font-size: 14px;
      cursor: pointer;

    .other-choices-toggle.open {

      border: 1px solid #1a1a1e;
      border-radius: 12px;
      padding: 14px;

      gap: 8px;
      margin-bottom: 8px;

      border-radius: 12px;
      color: #fff;
      font-size: 16px;

    .share-btn {

      border-radius: 10px;
      color: #fff;

    .action-buttons { display: flex; flex-direction: column; gap: 10px; }
    
    .home-btn {

      background: #6d5dbc;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .home-btn:hover { background: #6d28d9; }

    .restart-btn {
      width: 100%;
      padding: 16px;
      background: transparent;
      border: 1px solid #35353a;
      border-radius: 12px;
      color: #a1a1aa;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .restart-btn:hover { background: #232326; color: #fff; }

    .install-btn {
      width: 100%;

      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;

    .install-btn.hidden { display: none; }

    .promo-section {

      padding-top: 24px;

    }

    .eclipse-section {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .eclipse-section-title {
      font-size: 14px;
      color: #8b8b92;
      margin-bottom: 16px;

    .youtube-btn {

      align-items: center;
      justify-content: center;

      padding: 14px 32px;
      background: #232326;
      border: 1px solid #35353a;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .youtube-btn:hover {
      background: #35353a;
      transform: translateY(-2px);
    }
    
    .youtube-btn svg { fill: #ff0000; }
    
    .books-section {
      text-align: center;
      padding-top: 24px;
      border-top: 1px solid #232326;
    }
    
    .books-section-title {
      font-size: 14px;
      color: #8b8b92;
      margin-bottom: 20px;
    }
    
    .books-grid {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    
    .book-item {
      flex: 1;
      max-width: 140px;
      text-decoration: none;
      color: #fff;
      transition: all 0.2s;
    }

    .book-item img {
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      margin-bottom: 10px;
    }
    
    .book-item-title { font-size: 13px; color: #a1a1aa; }

    .hidden { display: none !important; }
  </style>
</head>

      {

        context: "친구가 직접 만나니 더 미안해하며 '진짜 미안해'를 반복한다.",

        choices: [

          {

            outcome: "친구가 고마워했다. 3개월 후, 갑자기 30만원이 들어왔다. 놀랐지만 기뻤다.",
            principle: "신뢰의 회복",

            evalText: "신뢰를 보여줬더니 친구가 결국 갚았다. 좋은 결말이다.",

          }
        ]
      },
      
      {
        id: "stage3_need",
        context: "네 상황을 알게 된 친구가 '미안, 몰랐어'라며 진지해졌다.",

        choices: [
          {

            evaluation: "positive",
            evalText: "네 상황을 알리니 친구가 우선순위를 올렸다. 바로 해결됐다!",
            nextStage: "end"
          },
          {
            text: "'그래 알았어. 가능할 때 보내줘'",
            outcome: "일주일 후 친구가 먼저 연락해서 '오늘 보냈어 미안했어'라고 한다.",
            principle: "자발적 동기",
            principleDesc: "강요보다 자발적 동기가 강하다. 상대가 스스로 결정하게 하면 더 잘 지킨다.",

            evalText: "친구가 스스로 움직였다. 좋은 결말이다.",
            nextStage: "end"
          }
        ]
      },
      
      {
        id: "stage3_indirect",
        context: "친구가 기분 나빠했다. '직접 말하지 왜 그래'라며 서운해한다.",
        situation: "관계가 틀어지고 있다. 어떻게 수습할까?",
        choices: [
          {
            text: "'미안, 직접 말하기 어려워서 그랬어. 앞으로는 직접 얘기할게'",
            outcome: "친구가 '...알겠어. 나도 미안해. 돈은 다음 주에 줄게'라며 풀렸다.",
            principle: "솔직한 인정",
            principleDesc: "실수를 인정하면 상대도 마음이 누그러진다. 변명보다 솔직한 인정이 신뢰를 쌓는다.",
            evaluation: "positive",
            evalText: "실수를 인정하고 관계를 회복했다.",
            nextStage: "end"
          },
          {
            text: "'내가 왜 미안해야 해? 돈 안 갚은 건 너잖아'",
            outcome: "친구가 '그래 내가 잘못했지. 근데 뒤에서 그러는 것도 잘한 거야?'라며 싸움이 커졌다.",
            principle: "정당화의 함정",
            principleDesc: "자기 행동을 정당화하면 상대도 정당화로 맞선다. 누가 더 잘못했나 싸움은 끝이 없다.",
            evaluation: "negative",
            evalText: "관계가 더 나빠졌다. 돈도 받기 어려워졌다.",
            nextStage: "end"
          }
        ]
      }
    ];

    let currentStageId = 1;
    let collectedPrinciples = [];
    let stageHistory = [];

    function getStageById(id) {
      return stages.find(s => s.id === id);
    }

    function init() {
      renderProgress();
      renderStage();
      
      document.getElementById('next-btn').addEventListener('click', nextStage);
      document.getElementById('restart-btn').addEventListener('click', restart);
      document.getElementById('native-share-btn').addEventListener('click', nativeShare);
      document.getElementById('copy-btn').addEventListener('click', copyLink);
      document.getElementById('other-toggle').addEventListener('click', toggleOtherChoices);
    }

    function toggleOtherChoices() {
      const content = document.getElementById('other-choices-content');
      const toggle = document.getElementById('other-toggle');
      content.classList.toggle('hidden');
      toggle.classList.toggle('open');
    }

    function renderProgress() {
      const totalStages = 3;
      const currentCount = stageHistory.length;
      
      const progressEl = document.getElementById('progress');
      progressEl.innerHTML = Array(totalStages).fill(0).map((_, idx) => {
        let className = 'progress-bar';
        if (idx < currentCount) className += ' completed';
        else if (idx === currentCount) className += ' current';
        return `<div class="${className}"></div>`;
      }).join('');
    }

    function renderStage() {
      const stage = getStageById(currentStageId);
      if (!stage) return;
      
      document.getElementById('stage-label').textContent = `Stage ${stageHistory.length + 1}`;
      document.getElementById('context').textContent = stage.context;
      document.getElementById('situation').textContent = stage.situation;
      
      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = stage.choices.map((choice, idx) => `
        <button class="choice-btn" data-index="${idx}">${choice.text}</button>
      `).join('');
      
      choicesEl.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => handleChoice(parseInt(btn.dataset.index)));
      });
      
      document.getElementById('choices').classList.remove('hidden');
      document.getElementById('result-section').classList.remove('show');
    }

    function handleChoice(index) {
      const stage = getStageById(currentStageId);
      const choice = stage.choices[index];
      
      stageHistory.push({
        stageId: currentStageId,
        choiceIndex: index,
        principle: choice.principle
      });
      
      if (!collectedPrinciples.find(p => p.name === choice.principle)) {
        collectedPrinciples.push({
          name: choice.principle,
          desc: choice.principleDesc
        });
      }
      
      document.getElementById('choices').classList.add('hidden');
      document.getElementById('result-section').classList.add('show');
      
      document.getElementById('selected-text').textContent = choice.text;
      document.getElementById('outcome-text').textContent = choice.outcome;
      document.getElementById('principle-name').textContent = choice.principle;
      document.getElementById('principle-explanation').textContent = choice.principleDesc;
      
      const evalCard = document.getElementById('evaluation-card');
      const evalIcon = document.getElementById('evaluation-icon');
      const evalText = document.getElementById('evaluation-text');
      
      evalCard.className = 'evaluation-card ' + choice.evaluation;
      evalText.textContent = choice.evalText;
      
      if (choice.evaluation === 'positive') evalIcon.textContent = '✓';
      else if (choice.evaluation === 'neutral') evalIcon.textContent = '⚠️';
      else evalIcon.textContent = '✗';
      
      const otherChoices = stage.choices.filter((_, i) => i !== index);
      const otherContent = document.getElementById('other-choices-content');
      otherContent.innerHTML = otherChoices.map(c => {
        let evalBadge = '';
        if (c.evaluation === 'positive') evalBadge = '<span class="eval-badge positive">✓ 효과적</span>';
        else if (c.evaluation === 'neutral') evalBadge = '<span class="eval-badge neutral">⚠️ 상황에 따라</span>';
        else evalBadge = '<span class="eval-badge negative">✗ 리스크</span>';
        
        return `
          <div class="other-choice-card">
            <div class="other-choice-header">${evalBadge}</div>
            <div class="other-choice-text">${c.text}</div>
            <div class="other-choice-outcome">${c.outcome}</div>
            <div class="other-choice-eval">${c.evalText}</div>
            <div class="other-choice-principle"><strong>${c.principle}</strong>: ${c.principleDesc}</div>
          </div>
        `;
      }).join('');
      
      document.getElementById('other-choices-content').classList.add('hidden');
      document.getElementById('other-toggle').classList.remove('open');
      
      const nextBtn = document.getElementById('next-btn');
      if (choice.nextStage === 'end') {
        nextBtn.textContent = '결과 보기';
      } else {
        nextBtn.textContent = '다음 상황';
      }
      
      currentStageId = choice.nextStage;
      renderProgress();
    }

    function nextStage() {
      if (currentStageId === 'end') {
        showFinalScreen();
      } else {
        renderStage();
      }
    }

    function showFinalScreen() {
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('final-screen').classList.add('show');
      
      const principlesList = document.getElementById('principles-list');
      principlesList.innerHTML = collectedPrinciples.map(p => `
        <div class="principle-item">
          <div class="principle-item-icon">💡</div>
          <div class="principle-item-content">
            <div class="principle-item-name">${p.name}</div>
            <div class="principle-item-desc">${p.desc}</div>
          </div>
        </div>
      `).join('');
      
      saveProgress();
      showInstallButton();
    }

    function saveProgress() {
      let saved = localStorage.getItem(STORAGE_KEY);
      let profile;
      
      if (saved) {
        profile = JSON.parse(saved);
      } else {
        profile = { name: '익명 탐험가', level: 1, exp: 0, completedSims: [], principles: [] };
      }
      
      if (!profile.completedSims) profile.completedSims = [];
      if (!profile.principles) profile.principles = [];
      
      const isFirstTime = !profile.completedSims.includes(SIM_ID);
      
      if (isFirstTime) {
        profile.completedSims.push(SIM_ID);
        profile.exp = (profile.exp || 0) + 30;
        
        const expNeeded = (profile.level || 1) * 100;
        while (profile.exp >= expNeeded) {
          profile.exp -= expNeeded;
          profile.level = (profile.level || 1) + 1;
        }
      }
      
      collectedPrinciples.forEach(p => {
        if (!profile.principles.find(existing => existing.name === p.name)) {
          profile.principles.push(p);
        }
      });
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
      
      // Firebase에도 저장
      const user = auth.currentUser;
      if (user) {
        const docRef = doc(db, 'users', user.uid);
        setDoc(docRef, { ...profile, updatedAt: new Date().toISOString() }, { merge: true })
          .then(() => console.log('클라우드 저장 완료'))
          .catch(console.error);
      }
    }

    function getShareText() {
      return `💰 이클립스의 딜렘

[돈 안 갚는 친구] 클리어!

발견한 원칙 ${collectedPrinciples.length}개:
${collectedPrinciples.map(p => '• ' + p.name).join('\n')}

당신은 돈을 받을 수 있을까요?`;
    }

    function nativeShare() {
      if (navigator.share) {
        navigator.share({
          title: '돈 안 갚는 친구 - 이클립스의 딜렘',
          text: getShareText(),
          url: SITE_URL
        }).catch(() => {});
      } else {
        copyLink();
      }
    }

    function copyLink() {
      const text = getShareText() + '\n' + SITE_URL;
      const btn = document.getElementById('copy-btn');
      
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('success');
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 복사 완료!`;
        setTimeout(() => {
          btn.classList.remove('success');
          btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 링크 복사`;
        }, 2000);
      });
    }

    function restart() {
      currentStageId = 1;
      collectedPrinciples = [];
      stageHistory = [];
      
      document.getElementById('final-screen').classList.remove('show');
      document.getElementById('game-screen').classList.remove('hidden');
      
      renderProgress();
      renderStage();
    }

    // PWA
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    function showInstallButton() {
      if (deferredPrompt && installBtn) {
        installBtn.classList.remove('hidden');
      }
    }

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.classList.add('hidden');
      }
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
      deferredPrompt = null;
    });

    init();
  </script>
</body>
