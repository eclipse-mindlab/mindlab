  <div class="sim-container">

      <div class="sim-principles-list hidden" id="principlesList"></div>
      <div class="sim-actions"><button class="sim-action-btn primary" id="saveImageBtn">📸 이미지 저장하기</button><button class="sim-action-btn secondary" id="shareBtn">친구한테 시켜보기</button><a href="index.html" class="sim-action-btn secondary">탐험 지도로 돌아가기</a></div>

        <div id="bookHookText" style="text-align:center;padding:20px 16px;margin-bottom:8px;font-size:15px;color:#c084fc;line-height:1.8;font-weight:500;">질투, 비교, 원한의 한복판에서 자기를 넘어선 자들의 사유.</div>
        <a href="https://litt.ly/eclipse.thinker" target="_blank" style="display:block;text-decoration:none;margin-bottom:24px;">
          <div style="background:linear-gradient(135deg,#10081a 0%,#1a1028 50%,#10081a 100%);border:1px solid rgba(168,85,247,0.3);border-radius:16px;padding:24px;text-align:center;">
            <img src="book-transcend.png" alt="초월자의 조건" style="width:200px;height:auto;border-radius:8px;margin-bottom:16px;box-shadow:0 8px 32px rgba(168,85,247,0.2);">
            <div style="font-size:17px;font-weight:700;color:#a855f7;margin-bottom:6px;">초월자의 조건</div>
            <div style="font-size:12px;color:#71717a;">야망은 큰데 왜 아직도 평범한가</div>
          </div>
        </a>
        <div style="font-size:12px;color:#52525b;text-align:center;margin-bottom:12px;">시리즈 더 보기</div>

          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item"><img src="book-fight.png" class="sim-book-cover"><div class="sim-book-title">싸움의 교양</div></a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item"><img src="book-love.png" class="sim-book-cover"><div class="sim-book-title">사랑은 오해다</div></a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item"><img src="book-wealth.png" class="sim-book-cover"><div class="sim-book-title">훔친 부 편</div></a>
        </div>

  <script src="sim-template.js"></script>
  <script>
const CONFIG={id:'ressentiment',title:'르상티망의 지도',shareIcon:'🪞',shareUrl:'https://bit.ly/ressentiment-sim',version:5,
stages:[
{badge:'소식',title:'전화',desc:'같이 취준하던 친구에게서 전화가 왔다.\n\n"나 드디어 합격했어!"\n\n같은 학교, 비슷한 스펙. 함께 스터디를 했다.\n\n당신은 3번째 불합격 중이다.\n\n"축하해." 말했다. 전화를 끊었다.',highlight:'전화를 끊었다. 당신은 —',
choices:[
{id:'work1',text:'하던 일을 계속한다.',subtext:'공부할 게 남아있다.',meaning:'책상 앞에 앉았다. 펜을 들었다. 같은 문장을 세 번째 읽고 있다. 글자가 머리에 들어오지 않는다. 30분이 지났다. 한 페이지도 못 넘겼다. 공부를 한 게 아니라, 공부하는 자세를 유지한 것이다. 몸은 책상 앞에 있지만 머리는 친구의 목소리를 반복 재생하고 있다.',principle:{name:'위장된 평정',desc:'아무렇지 않은 척 일상을 유지하는 것. 하지만 평소와 같은 행동을 하면서 평소와 같은 결과가 나오지 않는다면, 겉만 같은 것이다. 감정을 인식하지 않는 것과 감정이 없는 것은 다르다.',icon:'📖'},quote:'"아무렇지 않게 행동하는 것과 아무렇지 않은 것은 다르다."'},
{id:'search1',text:'그 친구가 간 회사를 검색한다.',subtext:'어떤 곳인지 궁금하다.',meaning:'검색창에 회사 이름을 친다. 연봉, 복지, 사내 문화, 합격 후기. 30분이 지났다. 당신은 회사를 알아본 게 아니다. 친구와 당신 사이의 거리를 측정한 것이다. "이 정도면 나도 갈 수 있었는데"가 떠오른다면 — 그것은 정보 수집이 아니라 비교다.',principle:{name:'거리 측정',desc:'타인의 성공을 검색하는 행위. 정보 수집처럼 보이지만, 실제로는 나와 상대 사이의 거리를 재는 것이다. 거리가 가까우면 "나도 할 수 있었는데"가 되고, 멀면 "걔는 원래 달랐어"가 된다. 어느 쪽이든 비교에서 시작됐다.',icon:'📏'},quote:'"검색하는 건 정보가 아니라 거리다."'},
{id:'call1',text:'다른 친구에게 전화한다.',subtext:'"걔 붙었대."',meaning:'"야, 걔 합격했대." 전화를 걸었다. 상대가 놀란다. "진짜? 대박." 둘이 10분간 그 친구 이야기를 한다. 끊고 나서 생각한다. 왜 전화했을까? 소식을 전한 건가, 누군가와 이 감정을 나누고 싶었던 건가. 그리고 — 전하면서 "걔 붙었대"라고 했지, "걔 붙어서 기쁘다"고 하지 않았다.',principle:{name:'감정의 외주',desc:'혼자 처리하기 어려운 감정을 타인에게 전달하는 것. 소식을 전하는 형태를 띠지만, 실제로는 자기 감정을 함께 처리해줄 사람을 찾는 것이다. 나쁜 것이 아니다. 다만 전달하는 방식에 당신의 감정이 묻어있다.',icon:'📱'},quote:'"남의 소식을 전하는 방식에 내 감정이 담겨 있다."'},
{id:'walk1',text:'핸드폰을 내려놓고 밖에 나간다.',subtext:'바람 좀 쐬야겠다.',meaning:'걷는다. 이어폰도 없이. 생각이 정리가 안 된다. 기쁜 건가? 맞다. 진심으로. 근데 왜 이렇게 에너지가 빠지는 걸까. 질투도 아니고, 분노도 아니고, 그냥 — 무기력하다. 이 무기력의 정체를 아직 모른다. 하지만 인식은 했다. 뭔가가 있다는 것을.',principle:{name:'감정 이전의 감각',desc:'아직 이름이 붙지 않은 감정. 질투라고 하기엔 노골적이지 않고, 축하라고 하기엔 개운하지 않다. 이 모호한 상태를 인식하는 것이 첫 번째 단계다. 이름이 붙기 전에 인식하면 다룰 수 있다. 이름이 붙고 나면 이미 굳어진다.',icon:'🌫️'},quote:'"감정은 이름이 붙기 전에 먼저 몸으로 온다."'}
]},
{badge:'비교',title:'3개월 뒤',desc:'3개월이 지났다.\n\n그 친구의 인스타에 회사 생활이 올라오기 시작했다. 야경이 보이는 사무실. 팀 회식. 신입 연수.\n\n사진이 빛난다.\n\n당신은 아직 준비 중이다.',highlight:'피드를 보고 있다. 다음 행동은?',
choices:[
{id:'like2',text:'좋아요 누르고 넘긴다.',subtext:'축하하는 마음이다.',meaning:'좋아요를 눌렀다. 스크롤을 내렸다. 다른 게시물. 또 누군가의 좋은 소식. 또 좋아요. 기계적으로 누른다. 엄지가 움직이지만 감정은 멈춰 있다. 좋아요는 축하인가, 의무인가. 안 누르면 "속 좁은 사람"이 될까봐 누르는 건 아닌가.',principle:{name:'사회적 의례',desc:'좋아요는 현대의 인사다. 감정과 무관하게 누르는 것. 문제는 이 의례가 진짜 감정을 덮는다는 것이다. 좋아요를 눌렀으니 축하한 것이라고 스스로를 설득한다. 하지만 엄지의 움직임과 마음의 움직임은 별개다.',icon:'👍'},quote:'"좋아요는 가장 적은 비용의 축하이자, 가장 정확한 회피다."'},
{id:'mute2',text:'뮤트한다. 조용히.',subtext:'안 보면 편하니까.',meaning:'뮤트했다. 아무도 모른다. 피드에서 사라졌다. 편하다. 하지만 왜 뮤트했는지 당신은 안다. "안 보면 편하니까." 이 문장을 뒤집으면 — "보면 불편하니까." 친구의 행복이 왜 불편한가. 이 질문을 피하기 위해 뮤트를 한 것이다.',principle:{name:'시야 관리',desc:'불편한 것을 시야에서 제거하는 것. 문제를 해결하는 게 아니라 문제를 안 보는 것이다. 뮤트는 디지털 시대의 회피 기제다. 보지 않으면 없는 게 아니라, 보지 않으면 다룰 수 없는 것이다.',icon:'🙈'},quote:'"안 보면 없는 게 아니다. 안 보면 다룰 수 없는 것이다."'},
{id:'deep2',text:'프로필에 들어가서 다른 게시물도 본다.',subtext:'요즘 어떻게 사나 궁금하다.',meaning:'프로필에 들어갔다. 게시물을 하나씩 본다. 회사 자랑, 퇴근 후 맛집, 동료들과 사진. 10분이 지났다. 20분. 당신은 "궁금해서" 들어간 게 아니다. 비교하고 있는 것이다. 상대의 삶과 나의 삶 사이의 거리를. 스크롤할수록 그 거리가 벌어지는 게 느껴진다.',principle:{name:'비교의 소용돌이',desc:'한 번 들어가면 멈추기 어렵다. 볼수록 비교가 깊어지고, 비교가 깊어질수록 더 보게 된다. 소용돌이다. "궁금해서"가 시작이지만, 빠져나올 때는 "왜 나는..."이 남는다.',icon:'🌀'},quote:'"스크롤을 멈출 수 없다면, 정보를 소비하는 게 아니라 감정을 소비하고 있는 것이다."'},
{id:'post2',text:'나도 뭔가 올려야 할 것 같다.',subtext:'내 근황도 보여줘야 하는데.',meaning:'인스타를 열었다. 올릴 게 없다. 사진을 뒤져본다. 괜찮아 보이는 사진 하나를 건진다. 필터를 입힌다. "요즘 이런 거 하는 중" 캡션을 쓴다. 올렸다. 좋아요가 하나씩 달린다. 하지만 안다. 이건 공유가 아니라 방어다. "나도 잘 살고 있어"를 증명하려는 것이다.',principle:{name:'방어적 전시',desc:'타인의 과시에 대한 반응으로 자기를 과시하는 것. SNS에서 가장 흔한 르상티망의 형태. 보여주기 위한 삶이 실제 삶을 대체하기 시작하면, 진짜 자기가 사라진다.',icon:'📸'},quote:'"보여주기 위해 사는 순간, 사는 것이 아니라 연기하는 것이다."'}
]},
{badge:'대면',title:'마주침',desc:'6개월 뒤. 친구들 모임에 그 친구도 왔다.\n\n양복이 잘 맞는다. 자신감이 보인다. 대화의 중심에 있다.\n\n누군가 묻는다. "너 요즘 어때?"\n\n친구가 회사 이야기를 한다. 다들 감탄한다.\n\n그리고 당신을 돌아본다.\n\n"너는 요즘 어때?"',highlight:'모든 시선이 당신에게 왔다.',
choices:[
{id:'fine3',text:'"나? 나름 잘 준비하고 있어."',subtext:'웃으며 말한다.',meaning:'"잘 준비하고 있어." 웃었다. 다들 고개를 끄덕인다. 넘어갔다. 하지만 화장실에 가서 거울을 본다. 방금 웃었는데, 지금은 웃고 있지 않다. "잘 준비하고 있다"는 거짓말이 아니다. 하지만 "잘"이 아니라 "그냥" 준비하고 있다는 것은 말하지 않았다.',principle:{name:'편집된 근황',desc:'사실이지만 전부가 아닌 것. "잘하고 있어"에서 "잘"만 빼면 진실이 된다. 우리는 타인 앞에서 자기 이야기를 편집한다. 편집의 정도가 자존감의 온도를 보여준다.',icon:'✂️'},quote:'"편집하지 않은 자기 이야기를 할 수 있는 사람이 몇이나 되는가."'},
{id:'topic3',text:'화제를 돌린다.',subtext:'"야 그거 먹어봤어?"',meaning:'화제를 돌렸다. 자연스럽게. 아무도 눈치 못 챘다. 하지만 당신은 안다. 왜 돌렸는지. "너는 어때?"에 답하면 비교가 시작되니까. 비교에서 질 게 뻔하니까. 화제 전환은 대화의 기술이지만, 지금 이 순간만큼은 도피의 기술이다.',principle:{name:'전략적 회피',desc:'불편한 질문을 피하는 가장 세련된 방법. 싸우지도 도망치지도 않는다. 그냥 없었던 일로 만든다. 효과적이지만, 피할수록 그 질문은 커진다.',icon:'🔀'},quote:'"피한 질문은 사라지지 않는다. 다음에 더 크게 돌아온다."'},
{id:'honest3',text:'"솔직히, 잘 안 되고 있어."',subtext:'있는 그대로 말한다.',meaning:'솔직하게 말했다. 테이블이 조용해졌다. 친구가 말한다. "... 힘들었겠다." 진심이 느껴진다. 이상하게 — 말하고 나니 가벼워졌다. 비교당할 줄 알았는데, 오히려 연결이 됐다. 솔직함이 비교를 멈추게 한 것이다. 비교는 편집된 나와 편집된 상대 사이에서 일어난다. 진짜 나를 보여주면 비교가 작동하지 않는다.',principle:{name:'솔직함의 해제력',desc:'비교는 가면과 가면 사이에서 일어난다. 가면을 벗으면 비교 회로가 멈춘다. 솔직함은 약함이 아니라, 비교 게임에서 빠져나오는 가장 빠른 경로다.',icon:'💎'},quote:'"솔직한 순간, 비교는 작동을 멈춘다."'},
{id:'leave3',text:'일찍 자리를 뜬다.',subtext:'"나 먼저 갈게."',meaning:'"먼저 갈게." 일어났다. 집에 가는 길, 이어폰을 꽂는다. 음악을 크게 튼다. 아무 생각도 하기 싫다. 하지만 음악 사이사이로 아까 장면이 끼어든다. 자신감 넘치는 친구. 감탄하는 사람들. 그리고 "너는 어때?"라는 질문. 자리를 떠났지만 감정은 따라왔다.',principle:{name:'물리적 도피',desc:'상황을 떠나면 감정도 떠날 것이라는 착각. 장소는 바꿀 수 있지만 감정은 휴대된다. 자리를 뜨는 것은 대처가 아니라 연기다.',icon:'🚶'},quote:'"도망친 곳에 낙원은 없다. — 같은 감정이 따라오니까."'}
]},
{badge:'전환',title:'일요일 밤',desc:'일요일 밤이다.\n\n이불 속에서 천장을 본다.\n\n그 친구 생각이 난다. 또. 왜 자꾸 떠오르는 걸까.\n\n질투인가? 아닌 것 같다. 분노인가? 그것도 아니다.\n\n그냥 — 나는 뭘 하고 있나, 싶다.',highlight:'"나는 뭘 하고 있는 걸까."',
choices:[
{id:'desire4',text:'원하는 것이 있다. 아직 못 잡았을 뿐이다.',subtext:'시간이 필요하다.',meaning:'원하는 것이 있다. 그런데 떠올려봐라. 그것을 원하기 시작한 시점이 언제였는가? 그 친구가 성공하기 전부터 원했는가, 이후부터인가? 만약 이후라면, 그 욕망은 당신에게서 나온 것이 아니라 비교에서 나온 것일 수 있다. 아닐 수도 있다. 하지만 점검해볼 가치가 있다.',principle:{name:'욕망의 출처',desc:'내가 원하는 것이 진짜 내 것인지 확인하는 법. 아무도 부러워하지 않는 상황에서도 같은 것을 원할 수 있는가? 그렇다면 당신의 욕망이다. 아니라면, 누군가의 성공이 만들어낸 그림자일 수 있다.',icon:'🔍'},quote:'"내 욕망이 진짜 내 것인지 확인하는 가장 좋은 방법은, 아무도 보지 않을 때도 같은 것을 원하는지 묻는 것이다."'},
{id:'blank4',text:'모르겠다. 뭘 원하는지.',subtext:'그게 제일 답답하다.',meaning:'모르겠다. 이것이 가장 솔직하고, 가장 어려운 답이다. 뭘 원하는지 모르면, 남이 가진 것이 기준이 된다. 친구가 대기업에 가니까 대기업이 정답 같고, 누가 창업에 성공하니까 창업이 맞는 것 같다. 나침반이 없으면 남의 방향을 따라간다. 따라가면서 뒤처졌다고 느낀다.',principle:{name:'나침반의 부재',desc:'자기 방향이 없을 때, 남의 방향이 기준이 된다. 르상티망의 뿌리는 남의 성공이 아니라, 자기 욕망의 부재다. 뭘 원하는지 찾는 것이 비교를 멈추는 유일한 방법이다.',icon:'🧭'},quote:'"나침반이 없는 사람은, 앞서가는 사람을 보고 뒤처졌다고 느낀다."'},
{id:'afraid4',text:'원하는 건 있다. 시작이 무섭다.',subtext:'실패하면 변명할 곳이 사라진다.',meaning:'원하는 건 있다. 구체적으로 안다. 하지만 시작하지 않는다. 시작하면 실패할 수 있기 때문이다. 시작하지 않는 한, "안 한 거지, 못 한 게 아니야"라는 가능성을 품고 살 수 있다. 하지만 가능성 속에 사는 건 편하지만, 가능성은 현실이 아니다.',principle:{name:'가능성의 감옥',desc:'시작하지 않으면 실패도 없다. 자존감이 유지된다. 하지만 이 안전장치가 5년째 작동 중이라면, 그것은 보호가 아니라 감금이다.',icon:'🫧'},quote:'"시작하지 않는 한, 당신은 영원히 천재일 수 있다. 하지만 영원히 아무것도 아니다."'}
]},
{badge:'결단',title:'1년 뒤',desc:'1년이 지났다.\n\n그 친구에게서 전화가 왔다.\n\n"나 잘렸어. 구조조정이야."\n\n목소리가 작다. 1년 전 당신에게 합격 소식을 전하던 그 목소리가 아니다.\n\n당신은 어떤 감정이 드는가.',highlight:'성공했던 친구가 무너졌다. 당신의 첫 감정은?',
choices:[
{id:'worry5',text:'걱정이 먼저 든다.',subtext:'"괜찮아? 뭐 도와줄 거 있어?"',meaning:'"괜찮아?" 진심이다. 걱정이 먼저 들었다. 이것은 르상티망이 아니다. 상대의 고통을 보고 고통을 느끼는 것. 1년간 비교했을 수 있다. 씁쓸했을 수 있다. 하지만 이 순간 걱정이 먼저 든다면, 비교보다 관계가 앞에 있는 것이다.',principle:{name:'관계의 우선',desc:'비교를 넘어서는 것은 의지가 아니라 관계다. 상대가 사람으로 보이는 순간, 비교가 뒤로 간다. 르상티망의 반대는 성공이 아니다. 상대를 사람으로 보는 것이다.',icon:'🤝'},quote:'"비교를 멈추는 건 의지가 아니라, 상대가 사람으로 보이는 순간이다."'},
{id:'relief5',text:'안도감이 스친다. 0.5초.',subtext:'그리고 바로 죄책감이 온다.',meaning:'안도감이 스쳤다. 0.5초. 그리고 바로 수치심이 왔다. "내가 이런 사람이었나?" 이 0.5초가 르상티망의 증거다. 부정할 필요 없다. 모든 인간에게 있다. 중요한 건 0.5초 뒤에 뭘 하느냐다. 안도에 머무는가, 수치심을 느끼는가, 전화를 거는가.',principle:{name:'0.5초의 진실',desc:'타인의 불행 앞에서 스치는 안도감. 인정하기 싫지만 존재한다. 이것은 악함이 아니라 인간의 조건이다. 르상티망의 유무가 아니라, 그 뒤에 어떤 행동을 선택하느냐가 당신을 정의한다.',icon:'⚡'},quote:'"0.5초의 감정은 통제할 수 없다. 그 다음 행동은 통제할 수 있다."'},
{id:'complex5',text:'복잡하다. 걱정도, 안도도, 죄책감도 다 있다.',subtext:'이게 정상인지 모르겠다.',meaning:'전부 있다. 걱정, 안도, 죄책감, 씁쓸함, 그리고 이런 자신에 대한 당혹감. 이것이 인간이다. 감정은 깨끗하지 않다. 한 가지만 느끼는 건 영화에서나 가능하다. 이 복잡함을 인정하는 것이 성숙이다. "나는 좋은 사람이야"도 아니고, "나는 나쁜 사람이야"도 아니다. 둘 다 있다.',principle:{name:'감정의 복잡성',desc:'인간의 감정은 단일하지 않다. 걱정과 안도가 동시에 존재할 수 있다. 이 복잡함을 부정하면 자기를 속이는 것이고, 인정하면 자기를 아는 것이다. 자기를 아는 것이 르상티망을 다루는 시작이다.',icon:'🌊'},quote:'"깨끗한 감정은 없다. 복잡한 감정을 인정하는 것이 정직의 시작이다."'},
{id:'mirror5',text:'이번엔 걔가 그 자리에 선 거구나.',subtext:'1년 전의 내가 떠오른다.',meaning:'1년 전, 당신은 불합격이었고 친구는 합격이었다. 지금, 친구가 무너지고 당신은 서 있다. 자리가 바뀌었다. 이 순간 깨닫는다. 성공과 실패는 고정된 것이 아니라 순환하는 것이라는 걸. 비교는 "지금 이 순간의 스냅샷"을 비교하는 것이지, 인생 전체를 비교하는 것이 아니었다.',principle:{name:'순환의 인식',desc:'성공과 실패는 영구하지 않다. 비교는 두 사람의 "이 순간"을 비교하는 것이지, 두 사람의 "인생"을 비교하는 것이 아니다. 이것을 아는 순간, 비교의 의미가 달라진다.',icon:'🔄'},quote:'"비교는 스냅샷이다. 인생은 영화다. 한 장면으로 영화를 판단하지 마라."'}
]}
],
calculateResult(choices,principles){
const scores={work1:1,search1:2,call1:1,walk1:0,like2:1,mute2:2,deep2:3,post2:2,fine3:1,topic3:2,honest3:0,leave3:2,desire4:1,blank4:2,afraid4:1,worry5:0,relief5:2,complex5:1,mirror5:0};
let total=0;choices.forEach(c=>{total+=scores[c.choiceId]||0;});
if(total<=3)return{icon:'☀️',label:'르상티망 수준',title:'자유로운 사람',desc:'당신은 타인의 성공에 크게 흔들리지 않습니다.\n\n비교가 없는 건 아니지만, 비교가 행동을 지배하지 않습니다. 자기 감정을 인식하고 솔직하게 마주할 수 있는 사람입니다.\n\n다만, "나는 괜찮다"는 확신이 점검을 멈추게 할 수 있습니다.',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}]};
if(total<=6)return{icon:'🌤️',label:'르상티망 수준',title:'인식하는 사람',desc:'당신은 비교하고, 흔들리지만, 인식하고 있습니다.\n\n완전히 자유롭지도, 완전히 갇혀있지도 않습니다. 이 진동이 정상입니다.\n\n중요한 건 어느 쪽으로 더 자주 돌아오느냐입니다.',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}]};
if(total<=10)return{icon:'🌥️',label:'르상티망 수준',title:'원한 속의 사람',desc:'타인의 성공이 당신의 에너지를 가져갑니다.\n\n이것은 나쁜 성격이 아니라, 자기 방향을 아직 찾지 못한 사람에게 나타나는 자연스러운 증상입니다.\n\n남의 점수판을 보는 시간을 자기 게임에 쓰면, 비교는 줄어듭니다.',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}]};
return{icon:'🌑',label:'르상티망 수준',title:'그림자 속의 사람',desc:'타인의 성공이 곧 나의 실패로 느껴집니다.\n\n이것은 약함이 아니라 고통입니다. 자기가 원하는 것을 찾지 못한 사람의 고통.\n\n첫 번째 할 일은 남을 분석하는 것을 멈추고, 자기 자신에게 묻는 것입니다.\n\n"나는 진짜 무엇을 원하는가?"',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}]};
},
getShareText(t){return'🪞 르상티망의 지도\n\n'+t+'\n\nhttps://bit.ly/ressentiment-sim';}
};
SimTemplate.init(CONFIG);
document.getElementById('shareBtn').addEventListener('click',async()=>{const t='🪞 르상티망의 지도\n\n'+document.getElementById('resultTitle').textContent+'\n\nhttps://bit.ly/ressentiment-sim';if(navigator.share){try{await navigator.share({title:'르상티망의 지도',text:t});}catch{}}else{navigator.clipboard.writeText(t).then(()=>{document.getElementById('shareBtn').textContent='링크 복사됨!';setTimeout(()=>{document.getElementById('shareBtn').textContent='친구한테 시켜보기';},2000);});}});
document.getElementById('saveImageBtn').addEventListener('click',()=>{const c=document.getElementById('shareCanvas'),x=c.getContext('2d');c.width=800;c.height=420;x.fillStyle='#10081a';x.fillRect(0,0,800,420);x.font='80px serif';x.textAlign='center';x.fillText(document.getElementById('resultIcon').textContent,400,100);x.font='bold 36px sans-serif';x.fillStyle='#fff';x.fillText(document.getElementById('resultTitle').textContent,400,170);x.font='16px sans-serif';x.fillStyle='#a855f7';x.fillText('르상티망의 지도',400,205);const l=document.createElement('a');l.download='르상티망_결과.png';l.href=c.toDataURL();l.click();});
  </script>
</body>
