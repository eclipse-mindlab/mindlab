      <div class="sim-principles-list hidden" id="principlesList"></div>

            <img src="book-transcend.png" alt="초월자의 조건" style="width:200px;height:auto;border-radius:8px;margin-bottom:16px;box-shadow:0 8px 32px rgba(168,85,247,0.2);">
            <div style="font-size:17px;font-weight:700;color:#a855f7;margin-bottom:6px;">초월자의 조건</div>

          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item"><img src="book-fight.png" class="sim-book-cover"><div class="sim-book-title">싸움의 교양</div></a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item"><img src="book-love.png" class="sim-book-cover"><div class="sim-book-title">사랑은 오해다</div></a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item"><img src="book-wealth.png" class="sim-book-cover"><div class="sim-book-title">훔친 부 편</div></a>
        </div>

  <script src="sim-template.js"></script>
  <script>
const CONFIG={id:'ressentiment',title:'르상티망의 지도',shareIcon:'🪞',shareUrl:'https://bit.ly/ressentiment-sim',version:5,
stages:[
{badge:'성공',title:'친구의 소식',desc:`오랜 친구에게서 연락이 왔다.\n\n"나 드디어 합격했어! 대기업 최종 합격!"\n\n당신은 3번째 불합격 중이다.\n같은 학교, 비슷한 성적. 함께 준비했다.\n\n친구가 먼저 도착했다.`,highlight:'당신보다 먼저 성공한 친구. 첫 반응은?',
choices:[
{id:'genuine1',text:'"축하해. 진심으로."',subtext:'진짜 기쁘다.',meaning:'축하한다. 진심이다. 하지만 전화를 끊고 나서 방에 혼자 앉아 있다. 기쁜 건 맞는데, 가슴 한구석이 무겁다. 이 무거움이 뭔지 모르겠다. 혼자 있을 때 드는 감정이 진짜 감정이다.',principle:{name:'진심의 무게',desc:'공적 감정과 사적 감정의 괴리가 르상티망의 첫 번째 신호다. 혼자 있을 때도 같은 감정인가?',icon:'🎭'},quote:'"우리는 친구의 불행에서 무언가 즐거운 것을 발견한다." - 라로슈푸코'},
{id:'deflect1',text:'"잘됐다. 근데 걔 부서 요즘 구조조정 얘기 있지 않아?"',subtext:'축하는 하는데, 한마디 붙인다.',meaning:'"잘됐다." 여기서 끝나면 축하다. 하지만 끝나지 않는다. "근데" 뒤에 붙는 한마디. 구조조정, 야근 문화, 연봉 동결. 축하하면서 동시에 상대의 성공에 균열을 넣는다. 의식하지 못할 수도 있다. 하지만 "근데"가 나온 순간, 이미 무의식이 작동한 것이다.',principle:{name:'도덕적 축소',desc:'니체가 말한 르상티망의 핵심 기제. 상대의 가치를 직접 부정하지 않는다. 대신 조건을 붙인다. "좋긴 한데", "근데", "그래도". 이 접속사들이 르상티망의 도구다. 축하 뒤에 붙는 "근데"를 세어보면 자기 안의 르상티망이 보인다.',icon:'⬇️'},quote:'"축하합니다, 하지만 — 이 하지만이 본심이다."'},
{id:'compare1',text:'"걔 아빠가 인맥 있지 않아?"',subtext:'순수한 실력만은 아닐 거다.',meaning:'인맥, 배경, 운. 사실일 수 있다. 세상은 공정하지 않으니까. 하지만 질문이 있다. 친구가 떨어졌을 때도 같은 분석을 했는가? 성공했을 때만 환경을 꺼내든다면, 분석의 동기가 진실이 아니라 위안일 수 있다.',principle:{name:'원인 전가',desc:'타인의 성공을 환경으로 돌리고, 자신의 실패를 환경으로 돌린다. 둘 다 자기 자신은 빠져 있다.',icon:'🔀'},quote:'"남의 성공에서 운을 발견하는 속도는, 자기 실패에서 운을 발견하는 속도와 같다."'}
]},
{badge:'비교',title:'SNS',desc:`인스타그램을 열었다.\n\n같은 나이의 누군가가 창업에 성공했다. 기사까지 났다.\n\n당신은 그를 모른다. 만난 적도 없다.\n\n하지만 스크롤을 멈추고 프로필을 본다.\n\n5분째 보고 있다.`,highlight:'모르는 사람의 성공에 왜 5분을 쓰는가?',
choices:[
{id:'close2',text:'닫는다. 보면 볼수록 기분이 나빠진다.',subtext:'더 보면 안 될 것 같다.',meaning:'닫았다. 자기 보호 본능이다. 하지만 왜 기분이 나빠지는가? 모르는 사람의 성공이 왜 당신의 기분을 건드리는가? 이 사람이 실패했으면 이 기분이 들었을까? 비교는 의지가 아니라 자동으로 작동한다. 닫아도 이미 비교는 끝난 뒤다.',principle:{name:'비교의 자동성',desc:'사회적 비교는 의지로 멈출 수 없다. 모르는 사람의 성공에 기분이 나빠진 순간, 비교는 이미 완료된 것이다. 앱을 닫아도 비교의 결과는 머릿속에 남는다.',icon:'🔄'},quote:'"비교를 멈추라는 말은 숨을 멈추라는 말과 같다."'},
{id:'study2',text:'그의 방법론을 분석한다.',subtext:'배울 점이 있을 수 있다.',meaning:'기사를 정독한다. 하지만 솔직해져야 한다. 정말 배우려고 보는 건가, 아니면 "이 정도면 나도 할 수 있었는데"를 확인하려고 보는 건가?',principle:{name:'위장된 르상티망',desc:'"나도 할 수 있었는데"는 겸손이 아니라 공격이다. 배움의 가면을 쓴 비하. 가장 교묘한 형태의 원한.',icon:'🎭'},quote:'"나도 할 수 있었다는 말은, 하지 않은 자의 가장 정교한 변명이다."'},
{id:'resent2',text:'"저 나이에 저게 가능해?"',subtext:'뭔가 있겠지.',meaning:'의심한다. 부모 돈? 투자자 인맥? 이 의심의 목적은 진실이 아니라, "세상은 공정하지 않다"는 결론을 통해 자신의 현 위치를 정당화하는 것이다.',principle:{name:'공정 세계 전복',desc:'세상이 불공정하다고 믿으면 내가 뒤처진 이유가 생긴다. "어차피 기울어진 운동장인데" — 이 문장이 르상티망의 최종 형태다.',icon:'⚖️'},quote:'"세상이 불공정하다는 믿음이, 가장 편안한 감옥이다."'}
]},
{badge:'성취',title:'후배의 추월',desc:`회사 후배가 당신보다 먼저 승진했다.\n\n2년 후배다. 당신이 가르쳤다.\n\n사람들이 말한다. "걔 진짜 잘하더라."\n\n당신도 안다. 잘하는 건 맞다.\n\n하지만.`,highlight:'내가 가르친 후배가 나를 넘어섰다.',
choices:[
{id:'accept3',text:'인정한다. 후배가 나보다 낫다.',subtext:'사실이니까.',meaning:'인정한다. 그리고 곧 다른 생각이 따라온다. "내가 후배일 때는 저런 기회가 없었어." 사실일 수 있다. 하지만 그 생각이 왜 지금 나오는가? 후배가 승진하지 않았어도 같은 생각을 했을까? 인정 뒤에 따라오는 "하지만"의 타이밍이, 동기를 보여준다.',principle:{name:'자기 보호적 귀인',desc:'후배의 성공을 인정하면서도 "조건이 달랐다"는 단서를 다는 건, 사실을 인정하되 의미를 왜곡하는 것이다.',icon:'🛡️'},quote:'"인정합니다 뒤에 붙는 하지만이, 진짜 본심이다."'},
{id:'teach3',text:'"내가 가르쳤으니 당연한 거지."',subtext:'스승의 공이 있다.',meaning:'"내가 가르쳤잖아." 사실이다. 하지만 이 말의 목적은 후배의 성공에서 자기 지분을 확보하는 것이다.',principle:{name:'공로 기생',desc:'타인의 성공에 자신을 연결시켜 간접적 자존감을 얻는 것. 진짜 스승은 제자의 성공에서 자기 지분을 주장하지 않는다.',icon:'🪢'},quote:'"제자가 스승을 넘어서는 것이 진짜 가르침의 증거다."'},
{id:'doubt3',text:'"정치 잘한 거겠지."',subtext:'실력만으로 승진하는 세상이 아니다.',meaning:'시스템의 문제로 전환한다. 사실일 수 있다. 하지만 이 분석의 출발점이 "왜 내가 아닌가"라는 것. 동기가 진단을 오염시킨다.',principle:{name:'르상티망의 합리화',desc:'르상티망은 반드시 합리적 옷을 입는다. 그 사실을 꺼내는 타이밍이 항상 내가 졌을 때라면, 그것은 비판이 아니라 변명이다.',icon:'🧥'},quote:'"비판과 원한의 차이는 내용이 아니라 타이밍에 있다."'}
]},
{badge:'전환',title:'자기 진단',desc:`일요일 밤이다.\n\n내일은 월요일. 또 출근이다. 또 같은 하루다.\n\n이불 속에서 천장을 본다.\n\n"나는 진짜 뭘 원하는 거지?"\n\n생각해보면, 마지막으로 무언가를 간절히 원한 게 언제인지 모르겠다.`,highlight:'마지막으로 진짜 원한 게 언제인가?',
choices:[
{id:'recent4',text:'최근에도 있다.',subtext:'지금도 원하는 게 있다.',meaning:'원하는 것이 있다. 그런데 한 가지만 떠올려봐라. 그것을 원하기 시작한 시점이 언제였는가? 누군가가 그것을 가진 걸 본 뒤가 아니었는가? 만약 그렇다면, 그 욕망은 당신에게서 나온 것이 아니라 복사된 것일 수 있다. 아닐 수도 있다. 하지만 한 번은 점검해볼 가치가 있다.',principle:{name:'모방 욕망',desc:'르네 지라르의 미메시스 이론. 인간은 타인이 원하는 것을 원한다. 내 욕망이 진짜 내 것인지 확인하는 법 — 아무도 부러워하지 않는 것도 원할 수 있는가?',icon:'🪞'},quote:'"인간은 타인의 욕망을 욕망한다." - 르네 지라르'},
{id:'forgot4',text:'기억나지 않는다.',subtext:'언제부터인지 모르겠다.',meaning:'이것이 르상티망의 진짜 뿌리다. 자기가 무엇을 원하는지 모르는 사람은, 남이 가진 것을 기준으로 삼는다. 질투의 원인은 남의 성공이 아니라, 자기 욕망의 부재다.',principle:{name:'욕망의 공백',desc:'원하는 것이 없으면, 가진 것이 없다는 사실만 선명해진다. 해법은 남을 따라잡는 것이 아니라, 자기 욕망을 되찾는 것이다.',icon:'🕳️'},quote:'"가장 위험한 상태는 아무것도 원하지 않는 것이다." - 니체'},
{id:'afraid4',text:'원하는 건 있는데, 시작하기가 두렵다.',subtext:'실패하면 변명할 곳이 사라진다.',meaning:'시작하지 않으면 실패도 없다. 실패가 없으면 자존감이 유지된다. "안 한 거지, 못 한 게 아니야." 이 문장으로 버틸 수 있다. 1년은. 3년은. 하지만 가능성 속에 사는 건 편하지만, 가능성은 현실이 아니다.',principle:{name:'가능성의 중독',desc:'"안 한 거지 못 한 게 아니야." 이 문장이 르상티망의 안전장치다. 시작하지 않으면 자존감이 유지된다. 하지만 인생이 멈춘다.',icon:'🫧'},quote:'"시작하지 않는 한, 당신은 영원히 천재일 수 있다."'}
]},
{badge:'결단',title:'니체의 질문',desc:`여기까지 오면서 몇 번이나 불편했는가?\n\n불편했다면, 정상이다.\n\n지금까지 당신은 남의 성공 앞에서 자기 안을 들여다봤다. 축하하면서도 깎아내리고, 인정하면서도 변명을 찾는 자신을.\n\n이제 마지막 질문이다.\n\n이걸 알게 된 지금, 어떻게 하겠는가?`,highlight:'르상티망을 알게 된 지금, 어떻게 하겠는가?',
choices:[
{id:'overcome5',text:'초월의 길. 내 게임을 시작한다.',subtext:'더 이상 남의 점수판을 보지 않는다.',meaning:'자기 게임을 시작한다. 하지만 솔직히 말하자. 내일 아침 인스타를 열면 또 누군가의 성공이 뜬다. 그때도 이 결심을 유지할 수 있는가? 니체가 말한 초인은 르상티망을 "극복한" 사람이 아니다. 르상티망을 느끼면서도 자기 것을 만드는 사람이다. 원한이 사라지는 게 아니라, 원한보다 큰 것이 생기는 것이다.',principle:{name:'위버멘쉬의 조건',desc:'모든 감정을 느끼면서도 자기 가치를 스스로 창조하는 존재. 르상티망보다 강한 욕망을 가지는 것이 "자기 극복"이다.',icon:'⚡'},quote:'"나를 죽이지 않는 것은 나를 강하게 만든다." - 니체'},
{id:'honest5',text:'솔직히, 아직 르상티망 안에 있다.',subtext:'인정하는 것부터.',meaning:'인정했다. 이것이 가장 어렵고 가장 중요한 단계다. 인정하는 순간, 선택지가 생긴다. 부정하면 보이지 않지만, 인정하면 다룰 수 있다.',principle:{name:'인식이 해방의 시작',desc:'르상티망을 인정하는 순간, 그것은 더 이상 당신을 지배하지 못한다. 보이지 않는 적은 이길 수 없지만, 보이는 적은 다룰 수 있다.',icon:'💡'},quote:'"너 자신을 알라." - 소크라테스'},
{id:'both5',text:'두 길이 분리된 게 아니다. 오가는 거다.',subtext:'초월했다가 다시 빠지고, 다시 올라온다.',meaning:'가장 현실적인 답이다. 어떤 날은 자기 일에 몰입하고, 어떤 날은 남의 성공에 흔들린다. 인간은 초월과 르상티망 사이를 오간다. 중요한 건 어느 쪽에 고정되느냐가 아니라, 어느 쪽으로 더 자주 돌아오느냐다.',principle:{name:'영원한 진동',desc:'초월은 도착이 아니라 과정이다. 중요한 건 떨어지지 않는 것이 아니라, 떨어졌을 때 알아차리는 속도다.',icon:'🌊'},quote:'"깨달음은 한 번의 사건이 아니라 매일의 수련이다." - 피에르 아도'}
]}

calculateResult(choices,principles){
const scores={genuine1:0,deflect1:2,compare1:3,close2:1,study2:2,resent2:3,accept3:1,teach3:2,doubt3:3,recent4:0,forgot4:2,afraid4:1,overcome5:0,honest5:1,both5:0};
let total=0;choices.forEach(c=>{total+=scores[c.choiceId]||0;});
if(total<=3)return{icon:'☀️',label:'르상티망 수준',title:'자유로운 사람',desc:'당신은 타인의 성공에 크게 흔들리지 않습니다.\n\n자기 기준이 있고, 남의 점수판에 연연하지 않습니다.\n\n다만, "나는 괜찮다"는 확신이 자기 점검을 멈추게 할 수 있습니다.',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}],bookHook:'질투, 비교, 원한의 한복판에서 자기를 넘어선 자들의 사유.'};
if(total<=7)return{icon:'🌤️',label:'르상티망 수준',title:'인식하는 사람',desc:'당신은 르상티망을 느끼지만, 인식하고 있습니다.\n\n니체는 말했습니다. 초인은 르상티망을 느끼면서도 자기 길을 가는 사람이라고.\n\n당신은 그 경계에 있습니다.',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}],bookHook:'질투, 비교, 원한의 한복판에서 자기를 넘어선 자들의 사유.'};
if(total<=11)return{icon:'🌥️',label:'르상티망 수준',title:'원한 속의 사람',desc:'당신은 타인의 성공이 불편합니다.\n\n이것은 나쁜 성격이 아닙니다. 자기 욕망을 잃어버린 사람에게 나타나는 자연스러운 증상입니다.\n\n르상티망의 반대는 "관대함"이 아닙니다. "자기 게임을 시작하는 것"입니다.',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}],bookHook:'질투, 비교, 원한의 한복판에서 자기를 넘어선 자들의 사유.'};
return{icon:'🌑',label:'르상티망 수준',title:'그림자 속의 사람',desc:'당신은 르상티망이 깊습니다.\n\n이것은 약함이 아닙니다. 자기가 원하는 것을 찾지 못한 사람의 고통.\n\n첫 번째 할 일은 자기 자신에게 묻는 것입니다. "나는 진짜 무엇을 원하는가?"',stats:[{value:total+'/15',label:'르상티망 지수'},{value:principles.length,label:'발견한 원칙'}],bookHook:'질투, 비교, 원한의 한복판에서 자기를 넘어선 자들의 사유.'};
},
getShareText(t){return'🪞 르상티망의 지도\n\n'+t+'\n\nhttps://bit.ly/ressentiment-sim';}
};
SimTemplate.init(CONFIG);

// 결과 화면에 bookHook 렌더링
const origShowResult = SimTemplate.showResult;
if (SimTemplate.showResult) {
  const _origCalc = CONFIG.calculateResult;
  CONFIG._lastBookHook = '';
  const _wrappedCalc = function(choices, principles) {
    const result = _origCalc(choices, principles);
    CONFIG._lastBookHook = result.bookHook || '';
    return result;
  };
  CONFIG.calculateResult = _wrappedCalc;
}
// 결과 화면 표시 후 bookHook 삽입
const observer = new MutationObserver(() => {
  const resultScreen = document.getElementById('resultScreen');
  if (resultScreen && !resultScreen.classList.contains('hidden') && CONFIG._lastBookHook) {
    const promo = document.querySelector('.sim-promo');
    if (promo && !document.getElementById('bookHookText')) {
      const hookDiv = document.createElement('div');
      hookDiv.id = 'bookHookText';
      hookDiv.style.cssText = 'text-align:center;padding:20px 16px;margin-bottom:8px;font-size:15px;color:#c084fc;line-height:1.8;font-weight:500;';
      hookDiv.textContent = CONFIG._lastBookHook;
      promo.insertBefore(hookDiv, promo.firstChild);
    }
  }
});
observer.observe(document.getElementById('resultScreen'), {attributes:true});
document.getElementById('shareBtn').addEventListener('click',async()=>{const t='🪞 르상티망의 지도\n\n'+document.getElementById('resultTitle').textContent+'\n\nhttps://bit.ly/ressentiment-sim';if(navigator.share){try{await navigator.share({title:'르상티망의 지도',text:t});}catch{}}else{navigator.clipboard.writeText(t).then(()=>{document.getElementById('shareBtn').textContent='링크 복사됨!';setTimeout(()=>{document.getElementById('shareBtn').textContent='친구한테 시켜보기';},2000);});}});
document.getElementById('saveImageBtn').addEventListener('click',()=>{const c=document.getElementById('shareCanvas'),x=c.getContext('2d');c.width=800;c.height=420;x.fillStyle='#10081a';x.fillRect(0,0,800,420);x.font='80px serif';x.textAlign='center';x.fillText(document.getElementById('resultIcon').textContent,400,100);x.font='bold 36px sans-serif';x.fillStyle='#fff';x.fillText(document.getElementById('resultTitle').textContent,400,170);x.font='16px sans-serif';x.fillStyle='#a855f7';x.fillText('르상티망의 지도',400,205);const l=document.createElement('a');l.download='르상티망_결과.png';l.href=c.toDataURL();l.click();});
  </script>
