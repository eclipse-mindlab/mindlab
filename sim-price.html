<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    :root {
      --sim-primary: #c9a84c;
      --sim-primary-light: #e0c068;
      --sim-primary-bg: rgba(201, 168, 76, 0.1);

</head>
<body>
  <div class="sim-container">
    <div class="sim-header">
      <a href="index.html" class="sim-back-btn">←</a>
      <div class="sim-header-title">돈의 가격</div>
    </div>
    <div id="gameScreen">
      <div class="sim-progress">
        <div class="sim-progress-label">
          <span id="stageLabel">STAGE 1</span>
          <span id="stageCount">1/5</span>
        </div>
        <div class="sim-progress-bar">
          <div class="sim-progress-fill" id="progressFill" style="width: 20%"></div>
        </div>
      </div>
      <div class="sim-stage-badge" id="stageBadge">STAGE 1</div>
      <div class="sim-situation">
        <div class="sim-situation-title" id="situationTitle"></div>
        <div class="sim-situation-desc" id="situationDesc"></div>
        <div class="sim-situation-highlight hidden" id="situationHighlight"></div>
        <div class="sim-situation-quote hidden" id="situationQuote"></div>
      </div>
      <div class="sim-choices" id="choices"></div>
    </div>
    <div id="explanationScreen" class="hidden">
      <div class="sim-explanation-card">
        <div class="sim-explanation-label">당신의 선택</div>
        <div class="sim-explanation-title" id="yourChoice"></div>
      </div>
      <div class="sim-explanation-card" id="meaningCard">
        <div class="sim-explanation-label">이 선택이 의미하는 것</div>
        <div class="sim-explanation-desc" id="choiceMeaning"></div>
      </div>
      <div class="sim-principle-card hidden" id="principleCard">
        <div class="sim-principle-header">
          <span class="sim-principle-icon">💡</span>
          <span>발견한 원칙</span>
        </div>
        <div class="sim-principle-name" id="principleName"></div>
        <div class="sim-principle-desc" id="principleDesc"></div>
      </div>
      <div class="sim-quote-card hidden" id="quoteCard">
        <span class="sim-quote-icon">💬</span>
        <span class="sim-quote-text" id="quoteText"></span>
      </div>
      <button class="sim-next-btn" id="nextBtn">다음으로</button>
    </div>
    <div id="resultScreen" class="hidden">
      <div class="sim-result-card">
        <div class="sim-result-icon" id="resultIcon">💸</div>
        <div class="sim-result-label" id="resultLabel">당신의 유형</div>
        <div class="sim-result-title" id="resultTitle"></div>
        <div class="sim-result-desc" id="resultDesc"></div>
        <div class="sim-result-stats hidden" id="resultStats"></div>
      </div>
      <div class="sim-principles-list hidden" id="principlesList"></div>
      <div class="sim-actions">
        <button class="sim-action-btn primary" id="saveImageBtn">📸 이미지 저장하기</button>
        <button class="sim-action-btn secondary" id="shareBtn">친구한테 시켜보기</button>
        <a href="index.html" class="sim-action-btn secondary">탐험 지도로 돌아가기</a>
      </div>
      <canvas id="shareCanvas" style="display:none;"></canvas>
      <div class="sim-promo">
        <div style="text-align: center; margin-bottom: 20px;">
          <div style="font-size: 14px; color: #c9a84c; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px;">이 시뮬레이터의 바탕이 된 생각들이 궁금하다면</div>
        </div>
        <a href="https://litt.ly/eclipse.thinker" target="_blank" style="display: block; text-decoration: none; margin-bottom: 24px;">
          <div style="background: linear-gradient(135deg, #1a1610 0%, #2a2118 50%, #1a1610 100%); border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 16px; padding: 24px; text-align: center;">
            <img src="book-wealth.png" alt="훔친 부 편" style="width: 200px; height: auto; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(201, 168, 76, 0.2);">
            <div style="font-size: 17px; font-weight: 700; color: #c9a84c; margin-bottom: 6px;">세계척학전집 — 훔친 부 편</div>
            <div style="font-size: 12px; color: #71717a;">있어 보이는 척하기 좋은 돈의 문법</div>
          </div>
        </a>

        <div style="font-size: 12px; color: #52525b; text-align: center; margin-bottom: 12px;">시리즈 더 보기</div>
        <div class="sim-books-grid">
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-philosophy.png" alt="훔친 철학 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 철학 편</div>
          </a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-psychology.png" alt="훔친 심리학 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 심리학 편</div>
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script src="sim-template.js"></script>
  <script>
    const CONFIG = {
      id: 'price',
      title: '돈의 가격',
      shareIcon: '💸',
      shareUrl: 'https://bit.ly/price-sim',
      version: 5,
      
      stages: [
        {
          badge: '양심',
          title: '제안',
          desc: `당신은 중견기업 과장이다. 연봉 5천만원. 나쁘지 않지만 넉넉하지도 않다.

어느 날, 경쟁사 임원에게서 연락이 온다.

"당신 회사 신제품 설계도. 넘기면 1억 줄게."

아무도 모른다. 증거도 안 남는다.
동료들의 1년이 물거품이 되지만, 당신 통장에 1억이 찍힌다.

연봉의 두 배다.`,
          highlight: '1억. 양심의 가격은 얼마인가?',
          choices: [
            {
              id: 'sell1',
              text: '넘긴다.',
              subtext: '1억이면 인생이 바뀐다.',
              meaning: '파일을 보내는 데 30초. 1억이 입금되는 데 1시간. 한 달 뒤, 경쟁사에서 똑같은 제품이 출시된다. 동료가 묻는다. "누가 넘긴 거 아니야?" 당신은 "글쎄"라고 말한다. 그 "글쎄"가 1억짜리다.',
              principle: { name: '양심의 시장가격', desc: '모든 사람에게는 양심을 파는 가격이 있는가? 1억에 안 팔아도 10억이면? 100억이면? "나는 절대 안 팔아"라고 말하는 사람도, 숫자가 커지면 멈칫한다. 그 멈칫하는 지점이 당신의 양심의 시장가격이다.', icon: '🪞' },
              quote: '"모든 사람에게는 가격이 있다. 다만 그 가격이 돈이 아닌 경우도 있을 뿐." - 무명'
            },
            {
              id: 'refuse1',
              text: '거절한다.',
              subtext: '돈이 전부는 아니다.',
              meaning: '전화를 끊는다. 연봉은 그대로다. 동료들은 모른다. 아무 일도 일어나지 않았다. 하지만 당신은 안다. 오늘 1억을 거절했다는 것. 그리고 그게 옳았는지 아직 확신이 없다는 것.',
              principle: { name: '기회비용의 무게', desc: '거절은 공짜가 아니다. 1억을 거절한 건 1억을 쓴 것과 같다. 양심을 지키는 데 1억을 지불한 것이다. 당신의 양심은 1억의 가치가 있는가? 그 질문에 "당연하지"라고 답하기가 왜 이렇게 어려운가.', icon: '💎' },
              quote: '"도덕에는 가격표가 없다. 하지만 대가는 있다." - 무명'
            },
            {
              id: 'negotiate1',
              text: '"3억이면 하겠습니다."',
              subtext: '팔 거면 제대로 받아야지.',
              meaning: '상대가 웃는다. "역시 현실적이시네." 3억에 합의한다. 당신은 방금 양심에 가격표를 붙였다. 1억에는 안 팔리던 양심이 3억에는 팔렸다. 재밌는 건 — 다음에는 1억에도 팔리게 될 것이다.',
              principle: { name: '도덕적 면허 효과', desc: '한 번 경계를 넘으면, 그 다음부터 넘는 게 쉬워진다. 심리학에서는 이걸 도덕적 면허 효과라고 한다. "한 번은 괜찮아"가 "또 한 번"이 되고, 결국 습관이 된다. 가격 협상을 시작한 순간, 팔겠다는 결정은 이미 끝난 것이다.', icon: '📉' },
              quote: '"처음이 가장 어렵다. 두 번째부터는 쉬워진다." - 도스토예프스키'
            }
          ]
        },
        {
          badge: '시간',
          title: '계약',
          desc: `승진 기회가 왔다. 연봉이 8천만원으로 오른다.

하지만 조건이 있다.

주 6일 근무. 매일 밤 10시 퇴근.
주말 호출에 응해야 한다.
여행, 취미, 연애 — 전부 뒤로 밀린다.

3년 계약이다.
3년 뒤에는 연봉 1억 2천.

지금 당신 나이, 20대 후반.
이 3년이 지나면 30대 초반이다.`,
          highlight: '3년의 자유. 얼마에 팔겠는가?',
          choices: [
            {
              id: 'sign2',
              text: '계약한다.',
              subtext: '20대에 고생해야 30대가 편하다.',
              meaning: '서명한다. 첫 달은 괜찮다. 두 번째 달, 친구들이 여행 사진을 올린다. 세 번째 달, 연인이 "우리 언제 만나?"라고 묻는다. 여섯 번째 달, 거울 속 얼굴이 낯설다. "3년만"이라고 했다. 하지만 3년 뒤에도 "3년만"이라고 할 것이다.',
              principle: { name: '쳇바퀴 효과', desc: '소득이 올라가면 행복이 올라갈까? 심리학 연구에 따르면, 연봉이 일정 수준을 넘으면 행복과의 상관관계가 급격히 약해진다. 하지만 높아진 생활 수준은 내려가지 않는다. 이걸 쾌락의 쳇바퀴라고 한다. 더 벌면 더 쓰고, 더 쓰면 더 벌어야 한다.', icon: '🐹' },
              quote: '"부자가 되는 것은 목적지가 아니라 쳇바퀴다." - 심리학 격언'
            },
            {
              id: 'reject2',
              text: '거절한다.',
              subtext: '20대는 다시 안 온다.',
              meaning: '거절한다. 연봉은 그대로다. 하지만 주말이 있다. 저녁이 있다. 3년 뒤, 승진한 동기가 차를 바꿨다. 당신은 아직 대중교통이다. "그때 할걸"이라는 생각이 스친다. 하지만 여행 사진을 꺼내본다. 그래도 괜찮은가?',
              principle: { name: '돈으로 살 수 없는 것', desc: '시간, 청춘, 경험, 관계. 이것들은 나중에 돈으로 살 수 없다. 30대에 돈이 있어도 20대의 체력은 돌아오지 않는다. 문제는 이걸 20대에는 모른다는 것이다. 알게 될 때는 이미 지나간 뒤다.', icon: '⏳' },
              quote: '"시간은 돈이라고? 천만에. 시간은 돈보다 비싸다." - 무명'
            },
            {
              id: 'counter2',
              text: '"주 5일이면 하겠습니다."',
              subtext: '조건을 깎아보자.',
              meaning: '"주 5일이면 하겠습니다." 상사가 고개를 젓는다. "그러면 연봉은 6천 5백." 당신은 또 계산을 시작한다. 3년 × 1500만원 차이 = 4500만원. 주말 52일 × 3년 = 156일. 하루에 약 29만원. 당신의 주말은 하루 29만원짜리인가?',
              principle: { name: '가치의 수량화', desc: '우리는 모든 것을 숫자로 바꾸려 한다. 시간을 시급으로, 관계를 투자 대비 수익으로, 행복을 연봉으로. 숫자로 바꾸는 순간, 비교가 가능해진다. 비교가 가능해지면, 더 높은 숫자를 쫓게 된다. 숫자로 바꿀 수 없는 것의 가치는 어떻게 매기는가?', icon: '🔢' },
              quote: '"가격을 아는 것과 가치를 아는 것은 다르다." - 오스카 와일드'
            }
          ]
        },
        {
          badge: '관계',
          title: '친구의 부탁',
          desc: `10년 친구가 사업을 시작했다.

투자를 부탁한다. 3천만원.

솔직히, 사업 계획이 허술하다. 실패할 확률이 높다.

하지만 이 친구는 당신이 어려울 때 200만원을 빌려준 적이 있다. 조건 없이.

"야, 나 진짜 이번에 잘 될 것 같아. 너만 믿는다."

3천만원은 당신 저축의 절반이다.`,
          highlight: '우정의 가격은 3천만원인가?',
          choices: [
            {
              id: 'invest3',
              text: '투자한다.',
              subtext: '그때 나를 도와준 친구다.',
              meaning: '3천만원을 보낸다. 6개월 뒤, 사업이 망한다. 친구가 말한다. "미안해. 갚을게." 1년이 지났다. 2년이 지났다. 돈은 돌아오지 않는다. 친구에게서 연락이 뜸해진다. 우정이 빚이 되었다. 200만원의 은혜가 3천만원의 채무로 바뀌었다.',
              principle: { name: '호혜성의 함정', desc: '누군가에게 빚진 감정은 판단을 왜곡한다. "그때 도와줬으니까 나도"는 감정이지 논리가 아니다. 200만원의 도움과 3천만원의 투자는 다른 차원의 결정이다. 하지만 호혜성은 이 차이를 무시하게 만든다.', icon: '🔄' },
              quote: '"돈을 빌려주면 돈도 잃고 친구도 잃는다." - 셰익스피어'
            },
            {
              id: 'decline3',
              text: '거절한다.',
              subtext: '"사업 계획부터 다시 짜봐."',
              meaning: '거절한다. 친구의 표정이 굳는다. "너까지 그러는 거야?" 전화가 끊긴다. 한 달 뒤, 친구가 다른 데서 돈을 빌려 사업을 시작한다. 6개월 뒤, 사업이 망한다. 당신은 3천만원을 지켰다. 하지만 친구에게서 "네가 믿어줬으면 달랐을 텐데"라는 말을 듣는다.',
              principle: { name: '감정과 판단의 분리', desc: '좋은 친구인 것과 좋은 투자인 것은 별개다. 하지만 인간은 감정과 판단을 분리하지 못한다. 친구가 부탁하면 사업 계획이 아니라 우정을 기준으로 결정한다. 거절하는 게 더 좋은 친구일 수 있다. 하지만 그걸 이해시키는 건 불가능에 가깝다.', icon: '🧠' },
              quote: '"진정한 친구는 원하는 걸 들어주는 사람이 아니라, 필요한 말을 해주는 사람이다." - 무명'
            },
            {
              id: 'partial3',
              text: '"500만원만 할게."',
              subtext: '잃어도 괜찮은 만큼만.',
              meaning: '"3천은 무리고, 500이면 할게." 친구가 고맙다고 한다. 하지만 눈빛이 달라졌다. "500으로 뭘 하라고" — 라는 말은 안 했지만, 느껴진다. 당신은 우정과 재정 사이에서 중간을 찾으려 했다. 하지만 중간은 양쪽 모두를 만족시키지 못한다.',
              principle: { name: '타협의 착각', desc: '타협은 양쪽 모두를 조금씩 불만족시키는 결정이다. 500만원은 친구를 만족시키기에 적고, 당신의 지갑을 지키기에 크다. "적당히"는 느낌은 좋지만, 결과는 어중간하다. 진짜 결정은 "한다" 아니면 "안 한다"뿐이다.', icon: '⚖️' },
              quote: '"타협은 양쪽 모두가 불만족하는 결과를 만든다." - 헨리 키신저'
            }
          ]
        },
        {
          badge: '자존심',
          title: '무릎',
          desc: `회사가 구조조정에 들어갔다.

당신은 살아남았다. 하지만 조건이 있다.

팀장이 말한다.
"네가 맡던 프로젝트, 이제 김 대리한테 넘겨. 너는 보조로 들어가."

김 대리. 당신보다 3년 후배다.
실력은 당신이 위다.
하지만 팀장과 친하다.

월급은 그대로다.
직급도 그대로다.
