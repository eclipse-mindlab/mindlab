<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>사랑의 온도 - 이클립스의 딜렘</title>
  <link rel="stylesheet" href="sim-template.css">
  <meta property="og:title" content="사랑의 온도 - 이클립스의 딜렘">
  <meta property="og:description" content="당신은 어떤 사랑을 하는 사람인가?">
  <meta property="og:image" content="https://eclipse-mindlab.github.io/mindlab/og-image.png?v=2">
  <style>
    :root {
      --sim-primary: #e05060;
      --sim-primary-light: #f06878;
      --sim-primary-bg: rgba(224, 80, 96, 0.1);
      --sim-primary-border: rgba(224, 80, 96, 0.3);
    }
  </style>
</head>
<body>
  <div class="sim-container">
    <div class="sim-header">
      <a href="index.html" class="sim-back-btn">←</a>
      <div class="sim-header-title">사랑의 온도</div>
    </div>
    <div id="gameScreen">
      <div class="sim-progress">
        <div class="sim-progress-label">
          <span id="stageLabel">STAGE 1</span>
          <span id="stageCount">1/5</span>
        </div>
        <div class="sim-progress-bar">
          <div class="sim-progress-fill" id="progressFill" style="width: 20%"></div>
        </div>
      </div>
      <div class="sim-stage-badge" id="stageBadge">STAGE 1</div>
      <div class="sim-situation">
        <div class="sim-situation-title" id="situationTitle"></div>
        <div class="sim-situation-desc" id="situationDesc"></div>
        <div class="sim-situation-highlight hidden" id="situationHighlight"></div>
        <div class="sim-situation-quote hidden" id="situationQuote"></div>
      </div>
      <div class="sim-choices" id="choices"></div>
    </div>
    <div id="explanationScreen" class="hidden">
      <div class="sim-explanation-card">
        <div class="sim-explanation-label">당신의 선택</div>
        <div class="sim-explanation-title" id="yourChoice"></div>
      </div>
      <div class="sim-explanation-card" id="meaningCard">
        <div class="sim-explanation-label">이 선택이 의미하는 것</div>
        <div class="sim-explanation-desc" id="choiceMeaning"></div>
      </div>
      <div class="sim-principle-card hidden" id="principleCard">
        <div class="sim-principle-header">
          <span class="sim-principle-icon">💡</span>
          <span>발견한 원칙</span>
        </div>
        <div class="sim-principle-name" id="principleName"></div>
        <div class="sim-principle-desc" id="principleDesc"></div>
      </div>
      <div class="sim-quote-card hidden" id="quoteCard">
        <span class="sim-quote-icon">💬</span>
        <span class="sim-quote-text" id="quoteText"></span>
      </div>
      <button class="sim-next-btn" id="nextBtn">다음으로</button>
    </div>
    <div id="resultScreen" class="hidden">
      <div class="sim-result-card">
        <div class="sim-result-icon" id="resultIcon">❤️</div>
        <div class="sim-result-label" id="resultLabel">당신의 사랑 유형</div>
        <div class="sim-result-title" id="resultTitle"></div>
        <div class="sim-result-desc" id="resultDesc"></div>
        <div class="sim-result-stats hidden" id="resultStats"></div>
      </div>
      <div class="sim-principles-list hidden" id="principlesList"></div>
      <div class="sim-actions">
        <button class="sim-action-btn primary" id="saveImageBtn">📸 이미지 저장하기</button>
        <button class="sim-action-btn secondary" id="shareBtn">친구한테 시켜보기</button>
        <a href="index.html" class="sim-action-btn secondary">탐험 지도로 돌아가기</a>
      </div>
      <canvas id="shareCanvas" style="display:none;"></canvas>
      <div class="sim-promo">
        <div style="text-align: center; margin-bottom: 20px;">
          <div style="font-size: 14px; color: #e05060; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px;">이 시뮬레이터의 바탕이 된 생각들이 궁금하다면</div>
        </div>
        <a href="https://litt.ly/eclipse.thinker" target="_blank" style="display: block; text-decoration: none; margin-bottom: 24px;">
          <div style="background: linear-gradient(135deg, #1a1015 0%, #2a1520 50%, #1a1015 100%); border: 1px solid rgba(224, 80, 96, 0.3); border-radius: 16px; padding: 24px; text-align: center;">
            <img src="book-love.png" alt="사랑은 오해다" style="width: 200px; height: auto; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(224, 80, 96, 0.2);">
            <div style="font-size: 17px; font-weight: 700; color: #e05060; margin-bottom: 6px;">세계척학전집 — 사랑은 오해다</div>
            <div style="font-size: 12px; color: #71717a;">있어 보이는 척하기 좋은 사랑의 공식</div>
          </div>
        </a>
        <div style="font-size: 12px; color: #52525b; text-align: center; margin-bottom: 12px;">시리즈 더 보기</div>
        <div class="sim-books-grid">
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-philosophy.png" alt="훔친 철학 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 철학 편</div>
          </a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-psychology.png" alt="훔친 심리학 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 심리학 편</div>
          </a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-wealth.png" alt="훔친 부 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 부 편</div>
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script src="sim-template.js"></script>
  <script>
    const CONFIG = {
      id: 'love-temp',
      title: '사랑의 온도',
      shareIcon: '❤️',
      shareUrl: 'https://bit.ly/love-temp-sim',
      version: 5,
      
      stages: [
        {
          badge: '시작',
          title: '첫 감정',
          desc: `좋아하는 사람이 생겼다.

아직 사귀는 사이는 아니다. 밥을 몇 번 같이 먹었고, 대화가 잘 통한다. 상대도 호감이 있는 것 같다.

하지만 확신은 없다.

주변에서 말한다. "그냥 고백해." "아직 일러." "좀 더 지켜봐."

당신은 어떻게 하겠는가?`,
          highlight: '확신 없는 감정. 어떻게 하겠는가?',
          choices: [
            {
              id: 'confess1',
              text: '고백한다.',
              subtext: '거절당해도 후회 없다.',
              meaning: '고백했다. 심장이 터질 것 같다. 상대가 놀란다. "... 고마워. 생각해볼게." 일주일이 1년 같다. 답이 왔다. "나도 좋아." 세상이 빛난다. 문제는 — 이 강도를 유지하려면 점점 더 강한 자극이 필요하다는 것이다. 3개월 뒤에도 이 심장 소리가 들릴까?',
              principle: { name: '에로스의 불꽃', desc: '에로스는 그리스어로 열정적 사랑이다. 강렬하고, 즉각적이고, 온몸으로 느끼는 사랑. 플라톤은 에로스를 아름다움을 향한 근본적 충동이라 했다. 하지만 에로스는 연료가 필요하다. 연료가 떨어지면 불꽃도 꺼진다.', icon: '🔥' },
              quote: '"사랑에 빠지는 것은 의지가 아니라 중력이다." - 무명'
            },
            {
              id: 'slow1',
              text: '천천히 더 친해진다.',
              subtext: '서두를 필요 없다.',
              meaning: '매주 한 번씩 만난다. 대화가 깊어진다. 서로의 상처를 알게 된다. 3개월 뒤, 자연스럽게 연인이 됐다. 고백이 없었다. 그냥 그렇게 됐다. 심장이 터질 것 같은 순간은 없었다. 대신 편안하다. 이것은 사랑인가, 우정의 연장인가?',
              principle: { name: '스토르게의 뿌리', desc: '스토르게는 가족 같은 사랑, 우정에서 자라는 사랑이다. 천천히 시작되고 깊이 뿌리 내린다. 화려하지 않지만 흔들리지 않는다. 문제는 "설렘"이 적다는 것이다. 편안함과 사랑의 경계는 어디인가.', icon: '🌱' },
              quote: '"가장 좋은 사랑은 가장 좋은 우정이다." - 무명'
            },
            {
              id: 'wait1',
              text: '상대가 먼저 다가올 때까지 기다린다.',
              subtext: '먼저 마음을 보이면 약해진다.',
              meaning: '기다린다. 상대의 반응을 살핀다. 메시지를 먼저 보내지 않는다. 상대가 먼저 연락하면, 조금 늦게 답한다. 밀당이다. 효과가 있다. 상대가 더 적극적으로 다가온다. 하지만 이게 사랑인가, 게임인가?',
              principle: { name: '루두스의 전략', desc: '루두스는 유희적 사랑이다. 사랑을 게임처럼 즐긴다. 밀당, 주도권, 긴장감. 관계를 가볍게 유지하고 싶어한다. 나쁜 것은 아니다. 하지만 게임에서 이기면 뭐가 남는가?', icon: '🎭' },
              quote: '"사랑에 전략이 필요하다면, 그것은 사랑이 아니라 전쟁이다." - 무명'
            }
          ]
        },
        {
          badge: '불안',
          title: '침묵',
          desc: `사귄 지 3개월.

연인이 이틀째 연락이 없다. 읽씹도 아니고, 아예 안 읽었다.

마지막 대화는 평범했다. 싸운 것도 아니다.

이틀이라는 시간. 누군가에게는 아무것도 아니다. 누군가에게는 영겁이다.

전화기를 본다.`,
          highlight: '이틀째 연락 없는 연인. 어떻게 하겠는가?',
          choices: [
            {
              id: 'call2',
              text: '전화한다.',
              subtext: '목소리를 들어야 안심이 된다.',
              meaning: '전화했다. 세 번 울리고 받는다. "아 미안, 요즘 좀 바빠서." 별일 아니었다. 안도한다. 하지만 끊고 나서 생각한다. 전화하기 전 2시간 동안 핸드폰을 몇 번이나 확인했는지. 상대의 부재가 일상을 흔드는 정도가 — 사랑의 크기인가, 불안의 크기인가.',
              principle: { name: '불안형 애착', desc: '볼비의 애착 이론. 어린 시절 양육자의 반응이 불안정했던 사람은, 성인이 되어서도 관계에서 불안을 느낀다. 상대의 침묵을 "사랑이 식은 신호"로 해석한다. 연락이 없으면 세상이 무너진다. 사랑이 아니라 불안이 관계를 움직이고 있을 수 있다.', icon: '😰' },
              quote: '"사랑이 아니라 불안이 전화기를 들게 한다면, 문제는 상대가 아니라 나다." - 무명'
            },
            {
              id: 'trust2',
              text: '기다린다. 바쁘겠지.',
              subtext: '이틀쯤이야.',
              meaning: '기다린다. 사흘째 되는 날 연락이 왔다. "일이 몰려서 미안." 괜찮다고 말한다. 진심으로 괜찮다. 상대에게 자기 시간이 있다는 걸 안다. 하지만 이런 생각이 스친다. "나는 3일을 참았는데, 상대는 3일 동안 나를 생각이나 했을까?"',
              principle: { name: '안정형 애착', desc: '안정적 애착을 가진 사람은 상대를 신뢰할 수 있다. 연락이 없어도 관계가 흔들리지 않는다는 확신이 있다. 이것은 무관심이 아니라 신뢰다. 다만, 때로는 "참는 것"을 "괜찮은 것"이라고 착각할 수 있다.', icon: '🌿' },
              quote: '"신뢰는 상대를 통제하지 않아도 편안한 상태다." - 무명'
            },
            {
              id: 'mirror2',
              text: '나도 연락 안 한다.',
              subtext: '먼저 하면 지는 거다.',
              meaning: '나도 안 읽는다. 3일이 지났다. 4일. 서로 연락이 없다. 5일째, 상대가 먼저 연락했다. "왜 연락 안 해?" "너도 안 했잖아." 웃으며 넘어간다. 하지만 속으로는 점수를 매기고 있다. 누가 먼저 했는지, 누가 더 기다렸는지.',
              principle: { name: '관계의 권력 게임', desc: '사랑에서 권력은 덜 사랑하는 쪽에게 있다. 이것을 "최소 관심의 원칙"이라 한다. 먼저 연락하면 약해 보인다는 생각. 하지만 사랑에서 이기려는 순간, 이미 사랑은 끝나고 있다.', icon: '♟️' },
              quote: '"사랑에서 이기고 싶다면, 이미 사랑이 아니다." - 무명'
            }
          ]
        },
        {
          badge: '희생',
          title: '갈림길',
          desc: `연인이 꿈을 위해 해외로 가야 한다.

2년이다. 당신에게는 말하지 않고 혼자 고민하고 있었다.

어제 밤, 처음으로 말했다.

"사실 합격했어. 가고 싶은데... 우리 때문에 고민이야."

눈이 빨갛다. 분명 며칠째 울었다.

2년. 비행기로 12시간 거리.`,
          highlight: '연인의 꿈과 당신의 사랑. 무엇을 선택하겠는가?',
          choices: [
            {
              id: 'let3',
              text: '"가. 응원할게."',
              subtext: '상대의 꿈이 더 중요하다.',
              meaning: '"가." 한마디가 이렇게 어려운 줄 몰랐다. 웃으며 말했지만, 돌아서서 운다. 상대의 꿈을 위해 자신의 욕구를 내려놓은 것이다. 숭고하다. 하지만 질문이 남는다. 상대가 진짜 원한 건 "가"라는 허락이었을까, 아니면 "가지 마"라는 한마디였을까?',
              principle: { name: '아가페의 빛', desc: '아가페는 조건 없는 사랑이다. 대가를 바라지 않고 주는 사랑. 기독교에서 신의 사랑이 이것이다. 숭고하지만 위험하다. 무조건 주기만 하면, 자기 자신이 소멸한다. 상대를 위한 희생인가, 자기 희생에 중독된 것인가.', icon: '✨' },
              quote: '"사랑은 소유가 아니라 해방이다." - 에리히 프롬'
            },
            {
              id: 'together3',
              text: '"같이 갈 수 없을까?"',
              subtext: '떨어져 있고 싶지 않다.',
              meaning: '"같이 가면 안 돼?" 상대가 멈칫한다. "너는... 여기 직장도 있고..." "관둘 수 있어." 진심이다. 이 사람 없이 2년은 상상할 수 없다. 하지만 상대의 눈에 부담이 스친다. 당신의 사랑이 상대의 짐이 될 수 있다는 걸, 아직 모른다.',
              principle: { name: '에로스의 합일', desc: '에로스적 사랑에서 가장 두려운 것은 분리다. "하나가 되고 싶다"는 욕구. 아리스토파네스의 신화처럼, 원래 하나였던 존재가 둘로 나뉘어 평생 반쪽을 찾아다닌다. 아름답지만, "하나가 되려는" 욕구가 상대를 숨 막히게 할 수 있다.', icon: '🔥' },
              quote: '"사랑은 둘이 같은 방향을 바라보는 것이다." - 생텍쥐페리'
            },
            {
              id: 'real3',
              text: '"2년이면... 현실적으로 힘들지 않을까."',
              subtext: '솔직히 말해야 한다.',
              meaning: '"현실적으로 이야기하자." 상대의 표정이 굳는다. "그게 무슨 뜻이야?" "장거리는 쉽지 않잖아. 서로 힘들 수 있어." 맞는 말이다. 하지만 상대가 듣고 싶었던 건 현실이 아니라 확신이었다. 현실적인 사랑은 때로 가장 차갑게 느껴진다.',
              principle: { name: '프라그마의 계산', desc: '프라그마는 현실적 사랑이다. 감정보다 조건, 열정보다 지속 가능성을 본다. 결혼 정보 회사, 조건 매칭 — 프라그마의 산물이다. 나쁜 것이 아니다. 감정만으로 유지되는 관계는 없으니까. 하지만 계산이 사랑의 전부가 되면, 사랑은 계약이 된다.', icon: '📊' },
              quote: '"조건 없는 사랑은 아름답지만, 조건 없이 지속되는 사랑은 없다." - 무명'
            }
          ]
        },
        {
          badge: '의심',
          title: '경계',
          desc: `연인의 핸드폰 화면에 알림이 떴다.

이름은 모르는 사람. 메시지 미리보기에 하트 이모지가 보인다.

바람은 아닐 것이다. 아마.

하지만 가슴이 철렁한다.

연인은 화장실에 갔다. 핸드폰이 테이블 위에 있다.`,
          highlight: '핸드폰을 볼 것인가?',
          choices: [
            {
              id: 'confront4',
              text: '바로 물어본다.',

    const oldShareBtn = document.getElementById('shareBtn');
    const newShareBtn = oldShareBtn.cloneNode(true);
    oldShareBtn.parentNode.replaceChild(newShareBtn, oldShareBtn);
    newShareBtn.addEventListener('click', async () => {
      const url = CONFIG.shareUrl;
      const result = document.getElementById('resultTitle').textContent;
      const text = '❤️ 사랑의 온도\n\n나의 사랑 유형: ' + result + '\n\n당신은 어떤 사랑을 하는 사람인가?\n\n' + url;

          const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        }
        newShareBtn.textContent = '링크 복사됨!';
        setTimeout(() => { newShareBtn.textContent = '친구한테 시켜보기'; }, 2000);
      }
    });

    document.getElementById('saveImageBtn').addEventListener('click', () => {

      canvas.width = 800; canvas.height = 420;
      
      const gradient = ctx.createLinearGradient(0, 0, 800, 420);
      gradient.addColorStop(0, '#1a1015');
      gradient.addColorStop(1, '#2a1520');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 800, 420);
      
      ctx.font = '80px serif';
      ctx.textAlign = 'center';
      ctx.fillText(document.getElementById('resultIcon').textContent, 400, 100);
      
      ctx.font = 'bold 36px -apple-system, sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(document.getElementById('resultTitle').textContent, 400, 170);
      
      ctx.font = '16px -apple-system, sans-serif';
      ctx.fillStyle = '#e05060';
      ctx.fillText(document.getElementById('resultLabel').textContent, 400, 205);
      
      ctx.font = '18px -apple-system, sans-serif';
      ctx.fillStyle = '#ccc';
      const desc = document.getElementById('resultDesc').textContent;
      const words = desc.split(' ');
      let line = '', y = 250;
      words.forEach(word => {
        const test = line + word + ' ';
        if (ctx.measureText(test).width > 700) { ctx.fillText(line, 400, y); line = word + ' '; y += 28; }
        else { line = test; }
      });
      if (line) ctx.fillText(line, 400, y);
      
      ctx.font = 'bold 20px -apple-system, sans-serif';
      ctx.fillStyle = '#e05060';
      ctx.fillText('사랑의 온도', 400, 390);
      ctx.font = '14px -apple-system, sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText('eclipse-mindlab.github.io/mindlab', 400, 410);
      
      const link = document.createElement('a');
      link.download = '사랑의온도_결과.png';
      link.href = canvas.toDataURL();
      link.click();
    });
