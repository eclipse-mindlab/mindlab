<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>부자의 조건 - 이클립스의 딜렘</title>
  <link rel="stylesheet" href="sim-template.css">
  <meta property="og:title" content="부자의 조건 - 이클립스의 딜렘">
  <meta property="og:description" content="아버지 수술비 3억. 2주. 당신은 무엇을 팔고, 무엇을 지키는가?">
  <meta property="og:image" content="https://eclipse-mindlab.github.io/mindlab/og-image.png?v=2">
  <style>
    :root {
      --sim-primary: #d4a843;
      --sim-primary-light: #e8c45a;
      --sim-primary-bg: rgba(212, 168, 67, 0.1);
      --sim-primary-border: rgba(212, 168, 67, 0.3);
    }
  </style>
</head>
<body>
  <div class="sim-container">
    <div class="sim-header">
      <a href="index.html" class="sim-back-btn">←</a>
      <div class="sim-header-title">부자의 조건</div>
    </div>
    <div id="gameScreen">
      <div class="sim-progress">
        <div class="sim-progress-label">
          <span id="stageLabel">STAGE 1</span>
          <span id="stageCount">1/5</span>
        </div>
        <div class="sim-progress-bar">
          <div class="sim-progress-fill" id="progressFill" style="width: 20%"></div>
        </div>
      </div>
      <div class="sim-stage-badge" id="stageBadge">STAGE 1</div>
      <div class="sim-situation">
        <div class="sim-situation-title" id="situationTitle"></div>
        <div class="sim-situation-desc" id="situationDesc"></div>
        <div class="sim-situation-highlight hidden" id="situationHighlight"></div>
        <div class="sim-situation-quote hidden" id="situationQuote"></div>
      </div>
      <div class="sim-choices" id="choices"></div>
    </div>
    <div id="explanationScreen" class="hidden">
      <div class="sim-explanation-card">
        <div class="sim-explanation-label">당신의 선택</div>
        <div class="sim-explanation-title" id="yourChoice"></div>
      </div>
      <div class="sim-explanation-card" id="meaningCard">
        <div class="sim-explanation-label">이 선택이 의미하는 것</div>
        <div class="sim-explanation-desc" id="choiceMeaning"></div>
      </div>
      <div class="sim-principle-card hidden" id="principleCard">
        <div class="sim-principle-header">
          <span class="sim-principle-icon">💡</span>
          <span>발견한 원칙</span>
        </div>
        <div class="sim-principle-name" id="principleName"></div>
        <div class="sim-principle-desc" id="principleDesc"></div>
      </div>
      <div class="sim-quote-card hidden" id="quoteCard">
        <span class="sim-quote-icon">💬</span>
        <span class="sim-quote-text" id="quoteText"></span>
      </div>
      <button class="sim-next-btn" id="nextBtn">다음으로</button>
    </div>
    <div id="resultScreen" class="hidden">
      <div class="sim-result-card">
        <div class="sim-result-icon" id="resultIcon">💰</div>
        <div class="sim-result-label" id="resultLabel">당신의 유형</div>
        <div class="sim-result-title" id="resultTitle"></div>
        <div class="sim-result-desc" id="resultDesc"></div>
        <div class="sim-result-stats hidden" id="resultStats"></div>
      </div>
      <div class="sim-principles-list hidden" id="principlesList"></div>
      <div class="sim-actions">
        <button class="sim-action-btn primary" id="saveImageBtn">📸 이미지 저장하기</button>
        <button class="sim-action-btn secondary" id="shareBtn">친구한테 시켜보기</button>
        <a href="index.html" class="sim-action-btn secondary">탐험 지도로 돌아가기</a>
      </div>
      <canvas id="shareCanvas" style="display:none;"></canvas>
      <div class="sim-promo">
        <!-- 메인 책 프로모션: 훔친 부 편 -->
        <div style="text-align: center; margin-bottom: 20px;">
          <div style="font-size: 14px; color: #d4a843; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px;">이 시뮬레이터의 바탕이 된 생각들이 궁금하다면</div>
        </div>
        <a href="https://litt.ly/eclipse.thinker" target="_blank" style="display: block; text-decoration: none; margin-bottom: 24px;">
          <div style="background: linear-gradient(135deg, #1a1610 0%, #2a2118 50%, #1a1610 100%); border: 1px solid rgba(212, 168, 67, 0.3); border-radius: 16px; padding: 24px; text-align: center;">
            <img src="book-wealth.png" alt="훔친 부 편" style="width: 200px; height: auto; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(212, 168, 67, 0.2);">
            <div style="font-size: 17px; font-weight: 700; color: #d4a843; margin-bottom: 6px;">세계척학전집 — 훔친 부 편</div>
            <div style="font-size: 12px; color: #71717a;">있어 보이는 척하기 좋은 돈의 문법</div>
          </div>
        </a>

        <!-- 시리즈 나머지 -->
        <div style="font-size: 12px; color: #52525b; text-align: center; margin-bottom: 12px;">시리즈 더 보기</div>
        <div class="sim-books-grid">
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-philosophy.png" alt="훔친 철학 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 철학 편</div>
          </a>
          <a href="https://litt.ly/eclipse.thinker" target="_blank" class="sim-book-item">
            <img src="book-psychology.png" alt="훔친 심리학 편" class="sim-book-cover">
            <div class="sim-book-title">훔친 심리학 편</div>
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script src="sim-template.js"></script>
  <script>
    const CONFIG = {
      id: 'rich',
      title: '부자의 조건',
      shareIcon: '💰',
      shareUrl: 'https://bit.ly/rich-sim',
      
      stages: [
        {
          badge: '발단',
          title: '전화 한 통',
          desc: `새벽 3시. 전화가 울린다.

어머니다.

"아빠가 쓰러졌어."

병원에 도착하니 의사가 말한다. 수술비 3억. 보험은 안 된다. 시간은 2주.

통장을 확인한다. 전 재산 1200만원.

2주 안에 3억.

아버지가 중환자실에 누워 있다. 의식이 없다. 어머니가 복도에서 울고 있다.`,
          highlight: '2주. 3억. 당신은 어떻게 하겠는가?',
          choices: [
            {
              id: 'friend1',
              text: '가장 친한 친구에게 전화한다.',
              subtext: '10년 지기다. 그 친구라면.',
              meaning: '새벽 4시에 전화를 받은 친구가 말한다. "... 얼마 필요해?" 3억이라고 말하는 순간, 전화기 너머로 숨소리만 들린다. 친구가 가진 전 재산이 2억이다. 당신은 그걸 알고 있다. 친구가 말한다. "... 좀 알아볼게." 끊고 나서 생각한다. 친구도 지금 잠을 못 자고 있겠구나.',
              principle: { name: '우정의 무게', desc: '돈을 빌리는 순간, 우정은 채무 관계가 된다. 갚으면 다행이다. 못 갚으면? 10년의 우정이 3억의 빚이 된다. "빌려줄게"라고 말한 친구의 선의가, 갚지 못하는 당신의 죄책감이 된다.', icon: '⚖️' },
              quote: '"돈을 빌려주면 돈도 잃고 친구도 잃는다." - 셰익스피어'
            },
            {
              id: 'loan1',
              text: '은행과 대출업체를 알아본다.',
              subtext: '시스템 안에서 해결한다.',
              meaning: '은행에서 거절당한다. 신용으로는 5천만원이 한계다. 제2금융권에서 1억. 나머지 2억은 어디서? 사채업자의 명함이 지갑에 있다. 연이자 40%. 3억을 갚으려면 매달 200만원씩 15년.',
              principle: { name: '빚의 시간', desc: '빚은 미래의 시간을 현재로 끌어오는 것이다. 오늘 3억을 쓰면, 앞으로 15년의 당신이 갚아야 한다. 돈을 빌리는 건 쉽다. 갚는 건 인생이다.', icon: '⏳' },
              quote: '"빚진 자는 자유로울 수 없다." - 벤자민 프랭클린'
            },
            {
              id: 'beg1',
              text: '병원에 사정한다.',
              subtext: '"분할로 해주실 수는 없나요..."',
              meaning: '의사가 고개를 젓는다. "수술은 선납입니다." 원무과에서 안내받는다. 정부 지원금, 긴급 의료비 대출, 크라우드 펀딩. 서류를 쓰는데 손이 떨린다. 2주 안에 가능할까? 아버지의 모니터에서 심박수가 깜빡인다.',
              principle: { name: '시스템의 벽', desc: '개인의 절박함은 시스템 앞에서 무력하다. 병원은 사업체이고, 의사는 선의만으로 수술할 수 없다. 돈이 없으면 목숨도 순번을 기다려야 하는 현실.', icon: '🏥' },
              quote: '"가난한 자에게 병은 사형선고다." - 의료 격언'
            }
          ]
        },
        {
          badge: '거래',
          title: '제안',
          desc: `3일이 지났다. 돈이 모자라다.

그때 연락이 온다. 회사 거래처 사장이다. 예전부터 당신에게 관심이 있었다.

"사정 들었어. 3억 빌려줄게. 대신 조건이 하나 있어."

당신 회사의 신제품 설계도를 넘기면 된다. 아직 공개 전이다. 넘기면 당신 회사는 경쟁에서 밀린다. 동료들의 1년 노력이 물거품이 된다.

"아무도 몰라. 네가 넘긴 건 나만 알아."

아버지의 수술까지 11일 남았다.`,
          highlight: '아버지의 목숨. 동료들의 1년. 당신의 양심.',
          choices: [
            {
              id: 'betray2',
              text: '설계도를 넘긴다.',
              subtext: '아버지가 먼저다.',
              meaning: '파일을 보내는 데 30초. 3억이 입금되는 데 1시간. 한 달 뒤, 경쟁사에서 똑같은 제품이 출시된다. 회사가 발칵 뒤집힌다. 동료가 묻는다. "이거 어떻게 된 거야? 누가 넘긴 거 아니야?" 당신은 "글쎄"라고 말한다. 그 "글쎄"가 목구멍에서 내려가지 않는다.',
              principle: { name: '양심의 무게', desc: '아무도 모르는 배신은 가장 무겁다. 들킬 걱정이 아니라, 매일 거울을 볼 때마다 자신이 어떤 사람인지 확인해야 하기 때문이다. 양심은 법정보다 정확하다.', icon: '🪞' },
              quote: '"내 머리 위의 별이 빛나는 하늘과 내 안의 도덕법칙." - 칸트'
            },
            {
              id: 'refuse2',
              text: '거절한다.',
              subtext: '"다른 방법을 찾겠습니다."',
              meaning: '전화를 끊고 화장실에서 운다. "다른 방법"이 뭔지 모른다. 10일 남았다. 아버지는 여전히 의식이 없다. 올바른 선택을 했다는 확신이 드는가? 원칙을 지켰지만, 아버지 곁에 앉아 있으면 그 원칙이 공허하게 느껴진다.',
              principle: { name: '원칙의 대가', desc: '원칙을 지키는 건 공짜가 아니다. 때로는 사랑하는 사람이 그 대가를 치른다. "옳은 일을 했다"는 확신이, 아버지 병상 앞에서 위안이 될 수 있을까?', icon: '💎' },
              quote: '"선한 사람이 아무 행동도 하지 않을 때, 악은 승리한다." - 에드먼드 버크'
            },
            {
              id: 'half2',
              text: '중요하지 않은 부분만 넘긴다.',
              subtext: '피해를 최소화하면...',
              meaning: '"핵심 기술 빼고 외형만 넘기자." 합리적으로 들린다. 일주일 뒤, 거래처 사장에게서 전화가 온다. "이거 껍데기잖아. 나머지 줘." 목소리가 차갑다. "안 주면? 네가 넘긴 거 회사에 알려줄까?" 한 발 들어간 늪에서 멈출 수 있다고 생각했는가?',
              principle: { name: '미끄러운 비탈길', desc: '작은 양보가 큰 양보의 시작이 된다. "이 정도면 괜찮아"는 가장 위험한 문장이다. 오늘 외형을 넘기면 내일은 핵심을 넘기게 된다. 경계를 허무는 건 한순간이다.', icon: '⛷️' },
              quote: '"처음 한 번이 가장 어렵다. 두 번째부터는 쉬워진다." - 도스토옙스키'
            }
          ]
        },
        {
          badge: '대가',
          title: '모멸',
          desc: `7일째. 여전히 돈이 부족하다.

어머니가 말한다.

"... 삼촌한테 부탁해볼까?"

삼촌. 아버지와 10년째 말을 안 하는 사람. 아버지 사업이 망했을 때 "그러게 내 말 들었어야지"라고 했던 사람. 명절마다 당신 가족을 깔보던 사람.

삼촌에게 돈이 있다. 많이 있다.

어머니가 전화를 건다. 삼촌이 조건을 내건다.

"좋아. 빌려줄게. 대신, 수술 끝나고 형이 회복되면 — 추석 때 온 가족 앞에서 '내가 틀렸다, 네 말이 맞았다'고 해. 직접."

아버지의 자존심.
그게 삼촌이 원하는 것이다.`,
          highlight: '아버지의 목숨과 아버지의 자존심. 당신이 선택할 수 있는가?',
          choices: [
            {
              id: 'call3',
              text: '받아들인다.',
              subtext: '일단 살아야 자존심이든 뭐든 있다.',
              meaning: '삼촌에게 전화한다. "네, 알겠습니다." 어머니가 안도의 한숨을 쉰다. 돈은 들어올 것이다. 하지만 당신은 아버지의 허락 없이, 아버지의 자존심을 팔았다. 추석이 오면 아버지는 모든 친척 앞에서 고개를 숙여야 한다. 그 순간, 아버지의 눈을 볼 수 있겠는가?',
              principle: { name: '대리 결정의 무게', desc: '누군가의 존엄을 대신 결정하는 것은 가능한가? 생명을 살리기 위해서라면 허용되는가? 아버지가 의식이 있었다면 절대 수락하지 않았을 조건을, 당신이 대신 수락했다.', icon: '🧎' },
              quote: '"타인의 존엄을 대신 포기할 권리는 누구에게도 없다." - 무명'
            },
            {
              id: 'refuse3',
              text: '거절한다.',
              subtext: '아버지가 회복해서 이 조건을 알면 — 차라리 죽는 게 낫다고 할 것이다.',
              meaning: '어머니가 울며 말한다. "그럼 어떻게 해..." 당신은 대답하지 못한다. 아버지를 아는 사람이라면 안다. 그 사람은 삼촌 앞에 무릎 꿇느니 차라리 수술을 거부할 사람이다. 하지만 아버지는 지금 그 선택조차 할 수 없다.',
              principle: { name: '부재자의 의사', desc: '의식 없는 사람의 뜻을 대신 결정하는 건 가능한가? "아버지라면 원하지 않았을 것이다"는 추측이다. 하지만 그 추측이 틀리면, 돌이킬 수 없다.', icon: '🤷' },
              quote: '"산 자가 죽은 자의 명예를 지키는 건, 사치일 수도 있고 의무일 수도 있다." - 무명'
            },
            {
              id: 'condition3',
              text: '"돈은 빌리되, 사과 조건은 빼주십시오."',
              subtext: '돈은 갚겠다. 하지만 아버지의 자존심은 건드리지 마라.',
              meaning: '삼촌이 웃는다. "돈만 빌리면 재미없잖아." 침묵. 그리고 말한다. "사과 없으면 돈도 없어." 삼촌이 원하는 건 돈을 돌려받는 게 아니다. 10년간 못 받은 인정이다. 이건 대출이 아니라 복수다.',
              principle: { name: '돈과 권력', desc: '돈을 빌려주는 행위 뒤에 권력 관계가 숨어 있다. 삼촌에게 3억은 큰돈이 아니다. 하지만 형의 공개 사과는 돈으로 살 수 없는 것이다. 시혜는 늘 대가를 요구한다. 그 대가가 돈이 아닐 때, 거래는 더 잔인해진다.', icon: '👑' },
              quote: '"돈을 빌려주는 자가 관계의 주인이 된다." - 발타사르 그라시안'
            }
          ]
        },
        {
          badge: '선택',
          title: '계약',
          desc: `10일째. 수술 날짜가 잡혔다. 4일 뒤.

어떻게든 2억은 마련했다. 나머지 1억.
